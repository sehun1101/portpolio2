<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>좀비 데드라인: 총력전</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@400;700;900&display=swap');
    
    body { margin: 0; overflow: hidden; background-color: #020617; user-select: none; font-family: 'Pretendard', sans-serif; }
    canvas { display: block; width: 100vw; height: 100vh; }
    .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .btn-unit { transition: all 0.1s; position: relative; }
    .btn-unit:active { transform: scale(0.9); }
    .font-title { font-family: 'Black Han Sans', sans-serif; }
    
    #minimap {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      width: 400px; height: 60px; background: rgba(0,0,0,0.7);
      border: 2px solid #334155; border-radius: 8px; overflow: hidden; z-index: 20;
    }
    .minimap-dot { position: absolute; width: 4px; height: 4px; border-radius: 50%; transform: translate(-50%, -50%); }

    #zombieInfo {
      position: fixed; top: 100px; left: 20px; width: 180px; z-index: 20;
    }

    @keyframes pulse-red { 0% { opacity: 0.5; } 100% { opacity: 1; } }
    .danger-tag { animation: pulse-red 0.5s infinite alternate; }
  </style>
</head>
<body>

  <!-- 시작 화면 -->
  <div id="startScreen" class="fixed inset-0 z-40 bg-slate-950 flex flex-col items-center justify-center">
    <div class="text-center mb-12">
      <h1 class="text-7xl font-title text-white mb-4 tracking-tighter uppercase">Total War</h1>
      <p class="text-slate-500 text-lg font-bold tracking-widest uppercase">The Horde is Coming</p>
    </div>
    <button onclick="startGame()" class="bg-blue-600 text-white px-12 py-4 rounded-full font-black text-xl shadow-xl hover:bg-blue-500 transition-all">작전 개시</button>
  </div>

  <!-- 인게임 UI -->
  <div id="gameUI" class="hidden">
    <!-- 미니맵 -->
    <div id="minimap">
      <div id="minimapContent" class="relative w-full h-full">
        <!-- 구역 표시 (배경) -->
        <div class="absolute h-full border-r border-white/10" style="left: 27%; width: 1px;"></div>
        <div class="absolute h-full border-r border-white/10" style="left: 58%; width: 1px;"></div>
        <div class="absolute h-full border-r border-white/10" style="left: 85%; width: 1px;"></div>
      </div>
    </div>

    <!-- 좀비 상태 정보 -->
    <div id="zombieInfo" class="glass-panel p-3 rounded-xl text-white text-[11px]">
      <p class="text-red-500 font-black mb-2 flex items-center gap-1">
        <span class="danger-tag">●</span> LIVE ZOMBIE INTEL
      </p>
      <div class="space-y-1 text-slate-300">
        <p>개체 수: <span id="zCount" class="text-white">0</span></p>
        <p>평균 체력: <span id="zAvgHp" class="text-white">0</span></p>
        <p>최고 공격력: <span id="zMaxDmg" class="text-white">0</span></p>
        <p class="mt-2 text-[9px] text-slate-500">※ 감염 구역 진입 시 80% 강화</p>
      </div>
    </div>

    <!-- 기본 자원 및 웨이브 -->
    <div class="fixed top-0 left-0 w-full p-6 flex justify-between items-start z-10 pointer-events-none">
      <div class="flex flex-col gap-4 pointer-events-auto">
        <div class="glass-panel p-4 rounded-2xl flex items-center gap-6 shadow-xl">
          <div class="text-center min-w-[80px]">
            <p class="text-[10px] text-slate-400 font-black uppercase tracking-tighter">Resources</p>
            <p id="budgetDisplay" class="text-3xl font-black text-emerald-400">$300</p>
          </div>
          <div class="w-px h-10 bg-slate-700"></div>
          <div class="text-center min-w-[60px]">
            <p class="text-[10px] text-slate-400 font-black uppercase tracking-tighter">Wave</p>
            <p id="waveDisplay" class="text-3xl font-black text-white">1</p>
          </div>
        </div>
      </div>

      <div id="respawnBox" class="hidden pointer-events-auto">
        <div class="bg-red-900/90 px-8 py-3 rounded-full border border-red-500 shadow-2xl text-center">
          <p class="text-[10px] font-black text-red-200 uppercase">Hero Fallen - Observation Mode</p>
          <p id="respawnTimeDisplay" class="text-3xl font-black text-white">30s</p>
          <p class="text-[10px] text-white/50">A / D 로 전장 정찰 가능</p>
        </div>
      </div>

      <div class="flex flex-col gap-3 pointer-events-auto">
        <div class="glass-panel p-4 rounded-2xl shadow-xl">
          <p class="text-[10px] text-blue-400 font-black mb-1 uppercase">HQ Integrity</p>
          <div class="w-64 h-3 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
            <div id="baseHpBar" class="h-full bg-blue-500 transition-all duration-300" style="width: 100%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 하단 유닛 생산 바 -->
    <div class="fixed bottom-0 left-0 w-full p-6 flex justify-center items-end gap-6 z-10 pointer-events-none">
      <div class="glass-panel p-2 rounded-3xl flex gap-3 border-t-2 border-slate-700 pointer-events-auto shadow-2xl">
        <button onmousedown="game.startSummon('knight')" onmouseup="game.stopSummon()" class="btn-unit w-20 h-24 bg-slate-900 rounded-xl flex flex-col items-center justify-center border-b-4 border-red-500">
          <span class="text-2xl">⚔️</span><span class="text-sm font-black text-red-400">$30</span>
          <span class="absolute top-1 left-2 text-[9px] text-slate-500 font-bold">1</span>
        </button>
        <button onmousedown="game.startSummon('soldier')" onmouseup="game.stopSummon()" class="btn-unit w-20 h-24 bg-slate-900 rounded-xl flex flex-col items-center justify-center border-b-4 border-blue-500">
          <span class="text-2xl">🔫</span><span class="text-sm font-black text-blue-400">$60</span>
          <span class="absolute top-1 left-2 text-[9px] text-slate-500 font-bold">2</span>
        </button>
        <button onmousedown="game.startSummon('sniper')" onmouseup="game.stopSummon()" class="btn-unit w-20 h-24 bg-slate-900 rounded-xl flex flex-col items-center justify-center border-b-4 border-yellow-500">
          <span class="text-2xl">🔭</span><span class="text-sm font-black text-yellow-400">$120</span>
          <span class="absolute top-1 left-2 text-[9px] text-slate-500 font-bold">3</span>
        </button>
        <button onmousedown="game.startSummon('bazooka')" onmouseup="game.stopSummon()" class="btn-unit w-20 h-24 bg-slate-900 rounded-xl flex flex-col items-center justify-center border-b-4 border-purple-500">
          <span class="text-2xl">🚀</span><span class="text-sm font-black text-purple-400">$200</span>
          <span class="absolute top-1 left-2 text-[9px] text-slate-500 font-bold">4</span>
        </button>
        <button onmousedown="game.startSummon('tank')" onmouseup="game.stopSummon()" class="btn-unit w-20 h-24 bg-slate-900 rounded-xl flex flex-col items-center justify-center border-b-4 border-green-500">
          <span class="text-2xl">🚜</span><span class="text-sm font-black text-green-400">$500</span>
          <span class="absolute top-1 left-2 text-[9px] text-slate-500 font-bold">5</span>
        </button>
      </div>
    </div>
  </div>

  <div id="resultScreen" class="fixed inset-0 bg-black/95 z-50 hidden flex-col items-center justify-center">
    <h2 class="text-8xl font-title text-red-600 mb-4">BASE DESTROYED</h2>
    <button onclick="location.reload()" class="bg-white text-black px-12 py-4 rounded-full font-black hover:scale-110">RETRY</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const minimapContent = document.getElementById('minimapContent');
    
    const COLORS = {
      HERO: '#ffffff', KNIGHT: '#f87171', SOLDIER: '#60a5fa', SNIPER: '#fbbf24', BAZOOKA: '#c084fc', TANK: '#4ade80',
      Z_NORM: '#4d7c0f', Z_SPIT: '#a3e635', Z_TANK: '#166534', Z_FAST: '#db2777', Z_BOSS: '#7f1d1d'
    };

    let cw, ch, GROUND_TOP, GROUND_BOTTOM;
    const WORLD_WIDTH = 5500; 

    function resize() {
      cw = window.innerWidth; ch = window.innerHeight;
      canvas.width = cw; canvas.height = ch;
      GROUND_TOP = ch * 0.35; GROUND_BOTTOM = ch * 0.92;
    }
    window.addEventListener('resize', resize);
    resize();

    class Game {
      constructor() {
        this.budget = 300; 
        this.wave = 1;
        this.waveProgress = 0;
        this.waveDuration = 45;
        
        this.base = { x: 300, y: (GROUND_TOP+GROUND_BOTTOM)/2, hp: 15000, maxHp: 15000, radius: 250 };
        this.hero = { x: 600, y: (GROUND_TOP+GROUND_BOTTOM)/2, hp: 1500, maxHp: 1500, speed: 500, radius: 25, isDead: false };
        this.units = []; this.zombies = []; this.bullets = [];
        this.cameraX = 0; this.keys = {}; this.lastTime = 0; this.spawnTimer = 0;
        this.isGameOver = false; 
        
        this.respawnBaseTime = 20; this.deathCount = 0; this.respawnTimer = 0;
        this.summonHoldType = null; this.summonTimer = 0;
        this.summonFastInterval = 0.08; // 소환 속도 대폭 상향

        this.zones = [
          { name: 'Asphalt', start: 0, end: 1500, color: '#1e293b' },
          { name: 'Warzone', start: 1500, end: 3200, color: '#334155' },
          { name: 'Wasteland', start: 3200, end: 4700, color: '#451a03' },
          { name: 'Infested', start: 4700, end: WORLD_WIDTH, color: '#2d064a' }
        ];

        window.addEventListener('keydown', e => { this.keys[e.code] = true; });
        window.addEventListener('keyup', e => { 
          this.keys[e.code] = false; 
          // 숫자키 떼었을 때 소환 중지
          if(['Digit1','Digit2','Digit3','Digit4','Digit5'].includes(e.code)) this.summonHoldType = null;
        });
      }

      startSummon(type) { this.summonHoldType = type; this.summonTimer = 99; }
      stopSummon() { this.summonHoldType = null; }

      summonUnit(type) {
        const specs = {
          knight: { cost: 30, color: COLORS.KNIGHT, hp: 550, dmg: 55, range: 80, cd: 0.5, speed: 220, radius: 18, weapon: 'sword' },
          soldier: { cost: 60, color: COLORS.SOLDIER, hp: 320, dmg: 65, range: 420, cd: 0.45, speed: 190, radius: 18, weapon: 'gun' },
          sniper: { cost: 120, color: COLORS.SNIPER, hp: 250, dmg: 160, range: 950, cd: 2.8, speed: 160, radius: 18, weapon: 'sniper' },
          bazooka: { cost: 200, color: COLORS.BAZOOKA, hp: 380, dmg: 110, range: 550, cd: 3.2, speed: 150, radius: 20, area: 160, weapon: 'launcher' },
          tank: { cost: 500, color: COLORS.TANK, hp: 2800, dmg: 120, range: 750, cd: 4.2, speed: 120, radius: 45, area: 260, weapon: 'cannon', isTank: true }
        };
        const s = specs[type];
        if (this.budget >= s.cost) {
          this.budget -= s.cost;
          // 배치 시 겹치지 않게 무작위성 강화
          this.units.push({
            ...s, type, x: 500 + Math.random()*250, y: GROUND_TOP + Math.random()*(GROUND_BOTTOM-GROUND_TOP), 
            curHp: s.hp, timer: 0, attackAnim: 0, 
            patrolTarget: { x: 2000 + Math.random()*1500, y: GROUND_TOP + Math.random()*(GROUND_BOTTOM-GROUND_TOP) }
          });
          return true;
        }
        return false;
      }

      spawnZombie() {
        const w = Math.floor(this.wave);
        const types = [
          { hp: 100 + (w*20), dmg: 12 + (w*2), speed: 80, color: COLORS.Z_NORM, reward: 15, radius: 20, minWave: 1 },
          { hp: 70 + (w*12), dmg: 15 + (w*2), speed: 90, color: COLORS.Z_SPIT, reward: 25, radius: 22, range: 480, minWave: 3 },
          { hp: 450 + (w*80), dmg: 25 + (w*3), speed: 55, color: COLORS.Z_TANK, reward: 80, radius: 35, area: 90, minWave: 5 },
          { hp: 90 + (w*15), dmg: 35 + (w*4), speed: 320, color: COLORS.Z_FAST, reward: 35, radius: 16, minWave: 7 },
          { hp: 2500 + (w*400), dmg: 100 + (w*20), speed: 45, color: COLORS.Z_BOSS, reward: 600, radius: 70, minWave: 10 }
        ];
        
        const available = types.filter(t => w >= t.minWave);
        const count = 3 + Math.floor(this.wave * 1.2);
        
        for(let i=0; i<count; i++) {
          const zT = available[Math.floor(Math.random() * available.length)];
          this.zombies.push({
            ...zT, x: WORLD_WIDTH + 100 + Math.random() * 500,
            y: GROUND_TOP + Math.random()*(GROUND_BOTTOM-GROUND_TOP),
            curHp: zT.hp, maxHp: zT.hp, timer: 0
          });
        }
      }

      update(dt) {
        if (this.isGameOver) return;
        
        // 유닛 소환 단축키 처리 (Hold 시 가속)
        if (this.keys['Digit1']) this.summonHoldType = 'knight';
        else if (this.keys['Digit2']) this.summonHoldType = 'soldier';
        else if (this.keys['Digit3']) this.summonHoldType = 'sniper';
        else if (this.keys['Digit4']) this.summonHoldType = 'bazooka';
        else if (this.keys['Digit5']) this.summonHoldType = 'tank';

        if (this.summonHoldType) {
          this.summonTimer += dt;
          if (this.summonTimer >= this.summonFastInterval) {
            this.summonUnit(this.summonHoldType);
            this.summonTimer = 0;
          }
        }

        this.budget += dt * (35 + this.wave * 6);
        this.waveProgress += dt;
        if (this.waveProgress >= this.waveDuration) {
          this.wave += 1; this.waveProgress = 0;
        }

        // 카메라 및 영웅 관리
        if (this.hero.isDead) {
          // 사망 시 관전자 모드 (A/D로 이동)
          if (this.keys['KeyA']) this.cameraX -= 1200 * dt;
          if (this.keys['KeyD']) this.cameraX += 1200 * dt;
          this.respawnTimer -= dt;
          if (this.respawnTimer <= 0) {
            this.hero.isDead = false; this.hero.hp = this.hero.maxHp;
            this.hero.x = 600; this.hero.y = (GROUND_TOP+GROUND_BOTTOM)/2;
          }
        } else {
          if (this.keys['KeyA']) this.hero.x -= this.hero.speed * dt;
          if (this.keys['KeyD']) this.hero.x += this.hero.speed * dt;
          if (this.keys['KeyW']) this.hero.y -= this.hero.speed * dt;
          if (this.keys['KeyS']) this.hero.y += this.hero.speed * dt;
          this.hero.x = Math.max(20, Math.min(this.hero.x, WORLD_WIDTH - 20));
          this.hero.y = Math.max(GROUND_TOP + 10, Math.min(this.hero.y, GROUND_BOTTOM - 10));

          if (this.hero.x > 4700) this.hero.hp -= 50 * dt;
          if (this.hero.hp <= 0) {
            this.hero.isDead = true; this.deathCount++;
            this.respawnTimer = this.respawnBaseTime + (this.deathCount * 5);
          }
          // 생존 시 영웅 추적 카메라
          this.cameraX += (this.hero.x - cw/2 - this.cameraX) * 0.15;
        }
        this.cameraX = Math.max(0, Math.min(this.cameraX, WORLD_WIDTH - cw));

        // 유닛 AI
        this.units.forEach(u => {
          if (u.timer > 0) u.timer -= dt;
          if (u.attackAnim > 0) u.attackAnim -= dt * 6;
          if (u.x > 4700) u.curHp -= 40 * dt;

          const target = this.zombies.find(z => Math.sqrt((z.x-u.x)**2 + (z.y-u.y)**2) < u.range + 50);
          if (target) {
            const dist = Math.sqrt((target.x-u.x)**2 + (target.y-u.y)**2);
            if (dist < u.range) {
              if (u.timer <= 0) {
                u.attackAnim = 1.0;
                if (u.weapon === 'sword') target.curHp -= u.dmg;
                else this.bullets.push({ x: u.x, y: u.y-40, tx: target.x, ty: target.y-30, speed: 2200, dmg: u.dmg, isAlly: true, color: u.color, area: u.area });
                u.timer = u.cd;
              }
            } else {
              const angle = Math.atan2(target.y - u.y, target.x - u.x);
              u.x += Math.cos(angle) * u.speed * dt; u.y += Math.sin(angle) * u.speed * dt;
            }
          } else {
            // 적이 없을 때 전진
            u.x += u.speed * 0.6 * dt;
            if (u.x > 4650) u.x = 4650; // 감염 구역 앞 대기
          }
          u.y = Math.max(GROUND_TOP, Math.min(u.y, GROUND_BOTTOM));
        });

        // 좀비 AI
        this.zombies.forEach(z => {
          if (z.timer > 0) z.timer -= dt;
          const powerMult = z.x > 4700 ? 1.8 : 1.0;
          const speedMult = z.x > 4700 ? 1.4 : 1.0;

          let target = null;
          let minDist = 2000;
          const enemies = [...this.units]; if (!this.hero.isDead) enemies.push(this.hero);
          enemies.forEach(p => {
            const d = Math.sqrt((p.x-z.x)**2 + (p.y-z.y)**2);
            if (d < 800 && d < minDist) { minDist = d; target = p; }
          });
          if (Math.sqrt((this.base.x-z.x)**2 + (this.base.y-z.y)**2) < 600) target = this.base;

          if (target) {
            const dist = Math.sqrt((target.x-z.x)**2 + (target.y-z.y)**2);
            const range = target === this.base ? 350 : (z.range || 85);
            if (dist < range) {
              if (z.timer <= 0) {
                if (z.range > 150) this.bullets.push({ x: z.x, y: z.y-40, tx: target.x, ty: target.y-20, speed: 900, dmg: z.dmg*powerMult, isAlly: false, color: z.color });
                else {
                  if (target === this.base) this.base.hp -= z.dmg*powerMult;
                  else if (target === this.hero) this.hero.hp -= z.dmg*powerMult;
                  else target.curHp -= z.dmg*powerMult;
                }
                z.timer = 1.3;
              }
            } else {
              const angle = Math.atan2(target.y - z.y, target.x - z.x);
              z.x += Math.cos(angle) * (z.speed * speedMult) * dt;
              z.y += Math.sin(angle) * (z.speed * speedMult) * dt;
            }
          } else {
            z.x -= z.speed * speedMult * dt; // 기지 방향 전진
          }
        });

        // 투사체
        this.bullets.forEach(b => {
          const dx = b.tx-b.x, dy = b.ty-b.y; const dist = Math.sqrt(dx*dx+dy*dy);
          b.x += (dx/dist) * b.speed * dt; b.y += (dy/dist) * b.speed * dt;
          if (dist < 40) {
            b.dead = true;
            if (b.isAlly) {
              if (b.area) this.zombies.forEach(z => { if (Math.sqrt((z.x-b.x)**2+(z.y-b.y)**2) < b.area) z.curHp -= b.dmg; });
              else { const h = this.zombies.find(z => Math.sqrt((z.x-b.x)**2+(z.y-b.y)**2) < 80); if (h) h.curHp -= b.dmg; }
            } else {
              if (!this.hero.isDead && Math.sqrt((this.hero.x-b.x)**2+(this.hero.y-b.y)**2) < 60) this.hero.hp -= b.dmg;
              this.units.forEach(u => { if (Math.sqrt((u.x-b.x)**2+(u.y-b.y)**2) < 60) u.curHp -= b.dmg; });
            }
          }
        });

        this.zombies = this.zombies.filter(z => z.curHp > 0 ? true : (this.budget += z.reward, false));
        this.units = this.units.filter(u => u.curHp > 0);
        this.bullets = this.bullets.filter(b => !b.dead);

        this.spawnTimer += dt;
        if (this.spawnTimer > Math.max(0.4, 2.8 - (this.wave * 0.2))) {
          this.spawnZombie(); this.spawnTimer = 0;
        }

        if (this.base.hp <= 0) { this.isGameOver = true; document.getElementById('resultScreen').classList.replace('hidden', 'flex'); }
        this.updateUI();
      }

      updateUI() {
        document.getElementById('budgetDisplay').innerText = `$${Math.floor(this.budget)}`;
        document.getElementById('waveDisplay').innerText = Math.floor(this.wave);
        document.getElementById('baseHpBar').style.width = `${(this.base.hp/this.base.maxHp)*100}%`;
        
        if (this.hero.isDead) {
          document.getElementById('respawnBox').classList.remove('hidden');
          document.getElementById('respawnTimeDisplay').innerText = `${Math.ceil(this.respawnTimer)}s`;
        } else {
          document.getElementById('respawnBox').classList.add('hidden');
        }

        // 좀비 인텔 업데이트
        document.getElementById('zCount').innerText = this.zombies.length;
        if (this.zombies.length > 0) {
          const avgHp = this.zombies.reduce((a,b)=>a+b.curHp,0)/this.zombies.length;
          const maxDmg = Math.max(...this.zombies.map(z=>z.dmg));
          document.getElementById('zAvgHp').innerText = Math.floor(avgHp);
          document.getElementById('zMaxDmg').innerText = Math.floor(maxDmg);
        }

        // 미니맵 업데이트
        this.updateMinimap();
      }

      updateMinimap() {
        minimapContent.innerHTML = '';
        const scale = 400 / WORLD_WIDTH;
        
        // 기지
        this.addMinimapDot(this.base.x * scale, 'blue', 8);
        // 영웅
        if(!this.hero.isDead) this.addMinimapDot(this.hero.x * scale, 'white', 6);
        // 아군
        this.units.forEach(u => this.addMinimapDot(u.x * scale, '#60a5fa', 3));
        // 좀비
        this.zombies.forEach(z => this.addMinimapDot(z.x * scale, '#ef4444', 3));
        // 카메라 영역
        const camDiv = document.createElement('div');
        camDiv.className = 'absolute top-0 h-full border border-white/40 bg-white/5';
        camDiv.style.left = (this.cameraX * scale) + 'px';
        camDiv.style.width = (cw * scale) + 'px';
        minimapContent.appendChild(camDiv);
      }

      addMinimapDot(left, color, size) {
        const dot = document.createElement('div');
        dot.className = 'minimap-dot';
        dot.style.left = left + 'px';
        dot.style.top = '50%';
        dot.style.backgroundColor = color;
        dot.style.width = size + 'px';
        dot.style.height = size + 'px';
        minimapContent.appendChild(dot);
      }

      draw() {
        ctx.clearRect(0, 0, cw, ch);
        ctx.save(); ctx.translate(-this.cameraX, 0);

        // 배경
        this.zones.forEach(z => {
          ctx.fillStyle = z.color;
          ctx.fillRect(z.start, GROUND_TOP, z.end - z.start, GROUND_BOTTOM - GROUND_TOP);
        });

        // 기지
        ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.ellipse(this.base.x, this.base.y, 300, 200, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 4; ctx.stroke();

        const entities = [...this.units, ...this.zombies];
        if (!this.hero.isDead) entities.push(this.hero);
        entities.sort((a,b)=>a.y-b.y);

        entities.forEach(e => {
          ctx.save(); ctx.translate(e.x, e.y);
          if (e === this.hero) {
            ctx.fillStyle = COLORS.HERO; ctx.fillRect(-18, -65, 36, 65);
            ctx.fillStyle = '#cbd5e1'; ctx.beginPath(); ctx.arc(0, -82, 14, 0, Math.PI*2); ctx.fill();
          } else if (e.weapon) {
            ctx.fillStyle = e.color; 
            if (e.isTank) { ctx.fillRect(-75, -60, 150, 60); }
            else { ctx.fillRect(-15, -50, 30, 50); ctx.fillStyle = '#f1f5f9'; ctx.beginPath(); ctx.arc(0, -62, 12, 0, Math.PI*2); ctx.fill(); }
            // HP Bar
            ctx.fillStyle = '#000'; ctx.fillRect(-25, -95, 50, 6);
            ctx.fillStyle = e.color; ctx.fillRect(-25, -95, (e.curHp/e.hp)*50, 6);
          } else {
            ctx.fillStyle = e.color; ctx.fillRect(-15, -50, 30, 50);
            ctx.fillStyle = '#94a3b8'; ctx.beginPath(); ctx.arc(0, -62, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.fillRect(-30, -90, 60, 7);
            ctx.fillStyle = '#ef4444'; ctx.fillRect(-30, -90, (e.curHp/e.maxHp)*60, 7);
          }
          ctx.restore();
        });

        this.bullets.forEach(b => {
          ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.area?18:8, 0, Math.PI*2); ctx.fill();
        });

        ctx.restore();
      }
    }

    const game = new Game();
    function startGame() {
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('gameUI').classList.remove('hidden');
      requestAnimationFrame(tick);
    }
    function tick(t) {
      const dt = Math.min(0.1, (t - game.lastTime)/1000);
      game.lastTime = t;
      game.update(dt); game.draw();
      requestAnimationFrame(tick);
    }
  </script>
</body>
