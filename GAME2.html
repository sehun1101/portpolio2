<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>좀비 데드라인: 생존의 끝</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@400;700;900&display=swap');
    
    body {
      margin: 0;
      overflow: hidden;
      background-color: #020617;
      user-select: none;
      font-family: 'Pretendard', sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .glass-panel {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .btn-action {
      transition: all 0.2s;
    }
    .btn-action:hover:not(:disabled) {
      transform: translateY(-4px);
      filter: brightness(1.2);
    }
    .btn-action:disabled {
      opacity: 0.4;
      filter: grayscale(100%);
    }
    .font-title { font-family: 'Black Han Sans', sans-serif; }
    
    #waveAlert {
      animation: alertSlide 3s ease-in-out forwards;
    }
    @keyframes alertSlide {
      0% { transform: translate(-50%, -100%); opacity: 0; }
      20% { transform: translate(-50%, 20%); opacity: 1; }
      80% { transform: translate(-50%, 20%); opacity: 1; }
      100% { transform: translate(-50%, -100%); opacity: 0; }
    }
  </style>
</head>
<body oncontextmenu="return false;">

  <!-- 시작 화면 -->
  <div id="startScreen" class="fixed inset-0 z-40 bg-slate-950 flex flex-col items-center justify-center">
    <div class="text-center mb-12">
      <h1 class="text-8xl font-title text-red-600 mb-4 tracking-tighter drop-shadow-[0_0_15px_rgba(220,38,38,0.5)]">
        Z-DEADLINE
      </h1>
      <p class="text-slate-400 text-xl font-bold uppercase tracking-widest">도시 방어 작전: 최후의 저항</p>
    </div>
    <button onclick="startGame()" class="btn-action bg-red-700 text-white px-16 py-5 rounded-full font-black text-2xl shadow-2xl shadow-red-900/50 hover:bg-red-600">
      작전 개시
    </button>
  </div>

  <!-- 웨이브 알림 UI -->
  <div id="waveAlert" class="fixed left-1/2 top-0 -translate-x-1/2 z-50 pointer-events-none hidden">
    <div class="bg-red-900/90 border-2 border-red-500 px-12 py-4 rounded-b-3xl text-white text-center">
      <p class="text-sm font-bold opacity-70">WARNING</p>
      <h2 id="waveAlertText" class="text-4xl font-title">WAVE 1 START</h2>
    </div>
  </div>

  <!-- 인게임 UI -->
  <div id="gameUI" class="hidden">
    <!-- 상단 대시보드 -->
    <div class="fixed top-0 left-0 w-full p-4 flex justify-between items-start z-10 pointer-events-none">
      <div class="flex gap-4 ml-4 pointer-events-auto">
        <div class="glass-panel p-3 rounded-2xl flex items-center gap-4">
          <div class="text-center">
            <p class="text-[10px] text-slate-400 font-bold uppercase">Budget</p>
            <p id="budgetDisplay" class="text-2xl font-black text-emerald-400">$0</p>
          </div>
          <div class="w-px h-8 bg-slate-700"></div>
          <div class="text-center">
            <p class="text-[10px] text-slate-400 font-bold uppercase">Wave</p>
            <p id="waveDisplay" class="text-2xl font-black text-white">1</p>
          </div>
        </div>
      </div>

      <div class="mr-4 pointer-events-auto">
        <div class="glass-panel p-3 rounded-2xl text-right">
          <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Target Kill Progress</p>
          <div class="w-48 h-2 bg-slate-800 rounded-full overflow-hidden">
            <div id="waveProgress" class="h-full bg-red-500 transition-all duration-300" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 하단 통제실 (유닛 선택 바) -->
    <div class="fixed bottom-0 left-0 w-full p-4 flex justify-center z-10 pointer-events-none">
      <div class="glass-panel p-4 rounded-3xl flex gap-2 border-t-2 border-slate-700 pointer-events-auto overflow-x-auto">
        <button id="btnSummon1" onclick="game.summonUnit('knight')" class="btn-action w-20 h-24 bg-slate-800 rounded-xl flex flex-col items-center justify-center gap-1 border border-slate-600">
          <span class="text-2xl">⚔️</span>
          <span class="text-[10px] font-bold text-white">보병(칼)</span>
          <span class="text-xs text-emerald-400">$30</span>
          <span class="text-[9px] text-slate-500">[1]</span>
        </button>
        <button id="btnSummon2" onclick="game.summonUnit('soldier')" class="btn-action w-20 h-24 bg-slate-800 rounded-xl flex flex-col items-center justify-center gap-1 border border-slate-600">
          <span class="text-2xl">🔫</span>
          <span class="text-[10px] font-bold text-white">돌격병</span>
          <span class="text-xs text-emerald-400">$60</span>
          <span class="text-[9px] text-slate-500">[2]</span>
        </button>
        <button id="btnSummon3" onclick="game.summonUnit('sniper')" class="btn-action w-20 h-24 bg-slate-800 rounded-xl flex flex-col items-center justify-center gap-1 border border-slate-600">
          <span class="text-2xl">🔭</span>
          <span class="text-[10px] font-bold text-white">저격병</span>
          <span class="text-xs text-emerald-400">$120</span>
          <span class="text-[9px] text-slate-500">[3]</span>
        </button>
        <button id="btnSummon4" onclick="game.summonUnit('bazooka')" class="btn-action w-20 h-24 bg-slate-800 rounded-xl flex flex-col items-center justify-center gap-1 border border-slate-600">
          <span class="text-2xl">🚀</span>
          <span class="text-[10px] font-bold text-white">바주카</span>
          <span class="text-xs text-emerald-400">$200</span>
          <span class="text-[9px] text-slate-500">[4]</span>
        </button>
        <button id="btnSummon5" onclick="game.summonUnit('tank')" class="btn-action w-20 h-24 bg-slate-800 rounded-xl flex flex-col items-center justify-center gap-1 border border-slate-600">
          <span class="text-2xl">🚜</span>
          <span class="text-[10px] font-bold text-white">탱크</span>
          <span class="text-xs text-emerald-400">$500</span>
          <span class="text-[9px] text-slate-500">[5]</span>
        </button>
        <div class="w-px bg-slate-700 mx-2"></div>
        <div class="flex flex-col justify-center px-2 min-w-[120px]">
          <p class="text-[9px] text-slate-400 font-bold uppercase">HERO CONTROL</p>
          <p class="text-[11px] font-bold text-blue-400">A/D: MOVE</p>
          <p class="text-[11px] font-bold text-blue-400">CLICK: SHOOT</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="resultScreen" class="fixed inset-0 bg-black/95 z-50 hidden flex-col items-center justify-center">
    <h2 id="resultTitle" class="text-8xl font-title text-red-600 mb-2">GAME OVER</h2>
    <p id="resultSub" class="text-slate-400 text-xl mb-12 uppercase tracking-widest">인류의 마지막 요새가 무너졌습니다.</p>
    <button onclick="location.reload()" class="bg-white text-black px-12 py-4 rounded-full font-black text-lg hover:bg-slate-200 transition-colors">
      재시작
    </button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let gameStarted = false;

    let cw = window.innerWidth;
    let ch = window.innerHeight;
    const WORLD_WIDTH = 4000; // 맵 크기 확장
    const GROUND_Y = ch * 0.8;

    function resize() {
      cw = window.innerWidth;
      ch = window.innerHeight;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = cw * dpr;
      canvas.height = ch * dpr;
      canvas.style.width = cw + 'px';
      canvas.style.height = ch + 'px';
      ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', resize);
    resize();

    function startGame() {
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameUI').classList.remove('hidden');
      gameStarted = true;
      game.startNewWave();
      requestAnimationFrame(gameLoop);
    }

    class Game {
      constructor() {
        this.lastTime = performance.now();
        this.budget = 200;
        this.entities = [];
        this.bullets = [];
        this.particles = [];
        this.floatingTexts = [];
        this.hero = new Hero(500, GROUND_Y);
        this.cameraX = 0;
        this.isGameOver = false;
        this.wave = 0;
        this.waveActive = false;
        this.zombiesToSpawn = 0;
        this.spawnTimer = 0;
        this.zombiesKilledInWave = 0;
        this.totalZombiesInWave = 0;
        
        this.keys = {};
        this.initInput();
      }

      initInput() {
        window.addEventListener('keydown', (e) => {
          this.keys[e.code] = true;
          if (e.key === '1') this.summonUnit('knight');
          if (e.key === '2') this.summonUnit('soldier');
          if (e.key === '3') this.summonUnit('sniper');
          if (e.key === '4') this.summonUnit('bazooka');
          if (e.key === '5') this.summonUnit('tank');
        });
        window.addEventListener('keyup', (e) => this.keys[e.code] = false);
        canvas.addEventListener('mousedown', (e) => {
          if (!gameStarted || this.isGameOver) return;
          this.hero.shoot(e.clientX + this.cameraX, e.clientY, this);
        });
        canvas.addEventListener('mousemove', (e) => {
          if (!gameStarted || this.isGameOver) return;
          this.hero.updateAim(e.clientX + this.cameraX, e.clientY);
        });
      }

      startNewWave() {
        this.wave++;
        this.waveActive = true;
        this.totalZombiesInWave = 10 + (this.wave * 5);
        this.zombiesToSpawn = this.totalZombiesInWave;
        this.zombiesKilledInWave = 0;
        
        const alertBox = document.getElementById('waveAlert');
        document.getElementById('waveAlertText').innerText = `WAVE ${this.wave} START`;
        alertBox.classList.remove('hidden');
        setTimeout(() => alertBox.classList.add('hidden'), 3000);
      }

      summonUnit(type) {
        const costs = { knight: 30, soldier: 60, sniper: 120, bazooka: 200, tank: 500 };
        if (this.budget >= costs[type]) {
          this.budget -= costs[type];
          this.entities.push(new AllyUnit(50, GROUND_Y, type));
          this.addFloatingText(`-$${costs[type]}`, 100, GROUND_Y - 100, '#10b981');
        }
      }

      addFloatingText(text, x, y, color) {
        this.floatingTexts.push({ text, x, y, color, life: 1.0 });
      }

      update(dt) {
        if (this.isGameOver) return;

        this.budget += dt * 5;
        this.updateUI();

        // 카메라 팔로잉
        const targetCamX = this.hero.x - cw / 2;
        this.cameraX += (targetCamX - this.cameraX) * 0.1;
        this.cameraX = Math.max(0, Math.min(this.cameraX, WORLD_WIDTH - cw));

        // 영웅 조종 (A, D)
        if (this.keys['KeyA']) this.hero.move(-1, dt);
        if (this.keys['KeyD']) this.hero.move(1, dt);
        this.hero.update(dt);

        // 엔티티 업데이트
        this.entities.forEach(e => e.update(dt, this));
        
        // 투사체 업데이트
        this.bullets.forEach(b => {
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          
          this.entities.forEach(e => {
            if (((b.isAlly && e instanceof Zombie) || (!b.isAlly && e instanceof AllyUnit || !b.isAlly && e === this.hero)) && !b.spent) {
              const dx = b.x - e.x;
              const dy = b.y - (e.y - 30);
              const hitRadius = (e instanceof Tank || e instanceof GiantZombie) ? 60 : 30;
              if (Math.sqrt(dx*dx + dy*dy) < hitRadius) {
                e.takeDamage(b.damage);
                b.spent = true;
                if (b.isExplosive) this.createExplosion(b.x, b.y, 100, 100);
              }
            }
          });
        });
        this.bullets = this.bullets.filter(b => !b.spent && b.x > 0 && b.x < WORLD_WIDTH);

        // 사망 처리
        this.entities = this.entities.filter(e => {
          if (e.hp <= 0 && e instanceof Zombie) {
            this.zombiesKilledInWave++;
            this.budget += e.reward;
            return false;
          }
          return e.hp > 0;
        });

        // 좀비 스폰 (오른쪽 끝)
        if (this.waveActive && this.zombiesToSpawn > 0) {
          this.spawnTimer += dt;
          if (this.spawnTimer > Math.max(0.3, 1.5 - (this.wave * 0.1))) {
            const types = ['normal', 'fast', 'tanky', 'spitter', 'giant'];
            const typeProb = [0.4, 0.2, 0.2, 0.15, 0.05];
            let rand = Math.random();
            let selectedType = 'normal';
            for(let i=0, p=0; i<typeProb.length; i++){
              p+=typeProb[i];
              if(rand < p) { selectedType = types[i]; break; }
            }
            this.entities.push(new Zombie(WORLD_WIDTH, GROUND_Y, selectedType, this.wave));
            this.zombiesToSpawn--;
            this.spawnTimer = 0;
          }
        }

        if (this.waveActive && this.zombiesKilledInWave >= this.totalZombiesInWave) {
          this.waveActive = false;
          setTimeout(() => { if(!this.isGameOver) this.startNewWave(); }, 5000);
        }

        this.particles.forEach(p => p.life -= dt);
        this.particles = this.particles.filter(p => p.life > 0);
        this.floatingTexts.forEach(ft => { ft.life -= dt; ft.y -= 40 * dt; });
        this.floatingTexts = this.floatingTexts.filter(ft => ft.life > 0);

        if (this.hero.hp <= 0) this.endGame();
      }

      createExplosion(x, y, radius, damage) {
        this.particles.push({ x, y, radius, life: 0.5, type: 'explosion' });
        this.entities.forEach(e => {
          if (e instanceof Zombie) {
            const dist = Math.abs(e.x - x);
            if (dist < radius) e.takeDamage(damage);
          }
        });
      }

      updateUI() {
        document.getElementById('budgetDisplay').innerText = `$${Math.floor(this.budget)}`;
        document.getElementById('waveDisplay').innerText = this.wave;
        const progress = (this.zombiesKilledInWave / this.totalZombiesInWave) * 100;
        document.getElementById('waveProgress').style.width = `${progress}%`;
      }

      endGame() {
        this.isGameOver = true;
        document.getElementById('resultScreen').classList.remove('hidden');
        document.getElementById('resultScreen').classList.add('flex');
      }

      draw() {
        ctx.save();
        ctx.translate(-this.cameraX, 0);
        
        // 배경: 평범하고 어두운 도시
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(this.cameraX, 0, cw, ch);
        
        // 건물 (단순한 실루엣)
        ctx.fillStyle = '#1e293b';
        for(let i=0; i<WORLD_WIDTH; i+=250) {
          const h = 300 + (Math.sin(i * 0.01) * 50);
          ctx.fillRect(i, GROUND_Y - h, 200, h);
          ctx.strokeStyle = '#0f172a';
          ctx.strokeRect(i, GROUND_Y - h, 200, h);
        }

        // 땅
        ctx.fillStyle = '#334155';
        ctx.fillRect(0, GROUND_Y, WORLD_WIDTH, ch - GROUND_Y);
        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 2;
        ctx.strokeRect(0, GROUND_Y, WORLD_WIDTH, 5);

        this.entities.forEach(e => e.draw(ctx));
        this.hero.draw(ctx);
        
        this.bullets.forEach(b => {
          ctx.fillStyle = b.isAlly ? '#fbbf24' : '#bef264';
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.isExplosive ? 6 : 3, 0, Math.PI*2);
          ctx.fill();
        });

        this.particles.forEach(p => {
          if(p.type === 'explosion') {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius * (1 - p.life*2), 0, Math.PI*2);
            ctx.fillStyle = `rgba(239, 68, 68, ${p.life})`;
            ctx.fill();
          }
        });

        this.floatingTexts.forEach(ft => {
          ctx.globalAlpha = ft.life;
          ctx.fillStyle = ft.color;
          ctx.font = 'bold 24px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(ft.text, ft.x, ft.y);
          ctx.globalAlpha = 1;
        });

        ctx.restore();
      }
    }

    class Hero {
      constructor(x, y) {
        this.x = x; this.y = y;
        this.hp = 1000; this.maxHp = 1000;
        this.aimAngle = 0;
        this.shootCooldown = 0;
        this.speed = 300;
      }
      move(dir, dt) {
        this.x += dir * this.speed * dt;
        this.x = Math.max(50, Math.min(this.x, WORLD_WIDTH - 50));
      }
      updateAim(mx, my) {
        this.aimAngle = Math.atan2(my - (this.y - 45), mx - this.x);
      }
      shoot(tx, ty, game) {
        if (this.shootCooldown > 0) return;
        const angle = Math.atan2(ty - (this.y - 45), tx - this.x);
        game.bullets.push({
          x: this.x, y: this.y - 45,
          vx: Math.cos(angle) * 1200, vy: Math.sin(angle) * 1200,
          damage: 50, spent: false, isAlly: true
        });
        this.shootCooldown = 0.2;
      }
      update(dt) { if (this.shootCooldown > 0) this.shootCooldown -= dt; }
      takeDamage(dmg) { this.hp -= dmg; }
      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.fillStyle = '#3b82f6'; ctx.fillRect(-15, -70, 30, 70); // 히어로 몸체
        ctx.fillStyle = '#f1f5f9'; ctx.beginPath(); ctx.arc(0, -80, 12, 0, Math.PI*2); ctx.fill(); // 머리
        ctx.save();
        ctx.translate(0, -45); ctx.rotate(this.aimAngle);
        ctx.fillStyle = '#0f172a'; ctx.fillRect(0, -4, 45, 8); // 총
        ctx.restore();
        // 체력바
        ctx.fillStyle = '#1e293b'; ctx.fillRect(-30, -110, 60, 6);
        ctx.fillStyle = '#3b82f6'; ctx.fillRect(-30, -110, (this.hp / this.maxHp) * 60, 6);
        ctx.restore();
      }
    }

    class AllyUnit {
      constructor(x, y, type) {
        this.x = x; this.y = y; this.type = type;
        const stats = {
          knight: { hp: 300, dmg: 40, range: 60, cd: 0.8, speed: 100 },
          soldier: { hp: 150, dmg: 20, range: 400, cd: 0.5, speed: 80 },
          sniper: { hp: 100, dmg: 120, range: 800, cd: 2.5, speed: 60 },
          bazooka: { hp: 120, dmg: 150, range: 500, cd: 3.5, speed: 50, explosive: true },
          tank: { hp: 1500, dmg: 200, range: 600, cd: 4.0, speed: 40, explosive: true }
        };
        const s = stats[type];
        this.hp = s.hp; this.maxHp = s.hp;
        this.damage = s.dmg; this.range = s.range;
        this.cooldown = s.cd; this.speed = s.speed;
        this.isExplosive = s.explosive || false;
        this.timer = 0;
      }
      update(dt, game) {
        if (this.timer > 0) this.timer -= dt;
        const target = game.entities.filter(e => e instanceof Zombie && e.x > this.x).sort((a,b) => a.x - b.x)[0];
        if (target && target.x - this.x < this.range) {
          if (this.timer <= 0) {
            if (this.type === 'knight') {
              target.takeDamage(this.damage);
            } else {
              const angle = Math.atan2((target.y-30) - (this.y-45), target.x - this.x);
              game.bullets.push({
                x: this.x, y: this.y - 45,
                vx: Math.cos(angle) * 900, vy: Math.sin(angle) * 900,
                damage: this.damage, spent: false, isAlly: true, isExplosive: this.isExplosive
              });
            }
            this.timer = this.cooldown;
          }
        } else {
          this.x += this.speed * dt;
        }
      }
      takeDamage(dmg) { this.hp -= dmg; }
      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        const color = { knight:'#94a3b8', soldier:'#1e293b', sniper:'#334155', bazooka:'#064e3b', tank:'#14532d' }[this.type];
        if (this.type === 'tank') {
          ctx.fillStyle = color; ctx.fillRect(-60, -60, 120, 60);
          ctx.fillStyle = '#0f172a'; ctx.fillRect(-70, -15, 140, 20); // 궤도
          ctx.fillStyle = color; ctx.fillRect(0, -50, 80, 15); // 포신
        } else {
          ctx.fillStyle = color; ctx.fillRect(-12, -50, 24, 50);
        }
        ctx.restore();
      }
    }

    class Zombie {
      constructor(x, y, type, wave) {
        this.x = x; this.y = y; this.type = type;
        const stats = {
          normal: { hp: 100, dmg: 15, speed: 60, reward: 20 },
          fast: { hp: 60, dmg: 10, speed: 150, reward: 25 },
          tanky: { hp: 400, dmg: 20, speed: 40, reward: 50 },
          spitter: { hp: 120, dmg: 25, speed: 50, range: 400, reward: 40 },
          giant: { hp: 2000, dmg: 60, speed: 30, reward: 200 }
        };
        const s = stats[type];
        const mult = 1 + (wave * 0.1);
        this.hp = s.hp * mult; this.maxHp = this.hp;
        this.damage = s.dmg * mult;
        this.speed = s.speed;
        this.reward = s.reward;
        this.range = s.range || 40;
        this.attackCooldown = 0;
      }
      update(dt, game) {
        if (this.attackCooldown > 0) this.attackCooldown -= dt;
        let target = game.entities.find(e => e instanceof AllyUnit && Math.abs(e.x - this.x) < this.range);
        if (!target && Math.abs(game.hero.x - this.x) < this.range) target = game.hero;

        if (target) {
          if (this.attackCooldown <= 0) {
            if (this.type === 'spitter') {
              const angle = Math.atan2((target.y-30) - (this.y-45), target.x - this.x);
              game.bullets.push({ x: this.x, y: this.y-45, vx: Math.cos(angle)*600, vy: Math.sin(angle)*600, damage: this.damage, isAlly: false, spent: false });
            } else {
              target.takeDamage(this.damage);
            }
            this.attackCooldown = 1.5;
          }
        } else {
          this.x -= this.speed * dt;
        }
      }
      takeDamage(dmg) { this.hp -= dmg; }
      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        const color = { normal:'#3f6212', fast:'#166534', tanky:'#064e3b', spitter:'#a3e635', giant:'#450a0a' }[this.type];
        const size = this.type === 'giant' ? 2 : 1;
        ctx.scale(size, size);
        ctx.fillStyle = color; ctx.fillRect(-15, -55, 30, 55);
        ctx.fillStyle = '#ef4444'; ctx.fillRect(-20, -70, 40, 4);
        ctx.fillStyle = '#22c55e'; ctx.fillRect(-20, -70, (this.hp / this.maxHp) * 40, 4);
        ctx.restore();
      }
    }

    const game = new Game();
    function gameLoop(ts) {
      if (!gameStarted) return;
      let dt = (ts - game.lastTime) / 1000;
      if (dt > 0.1) dt = 0.1;
      game.lastTime = ts;
      game.update(dt);
      game.draw();
      requestAnimationFrame(gameLoop);
    }
  </script>
</body>
</html>
