<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>좀비 데드라인: 총력전</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@400;700;900&display=swap');
    
    body { margin: 0; overflow: hidden; background-color: #020617; user-select: none; font-family: 'Pretendard', sans-serif; }
    canvas { display: block; width: 100vw; height: 100vh; }
    .glass-panel { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .btn-unit { transition: all 0.2s; position: relative; overflow: visible; }
    .btn-unit:hover .tooltip { opacity: 1; visibility: visible; transform: translateY(-10px); }
    .btn-unit:hover:not(:disabled), .btn-unit.active { transform: translateY(-3px); filter: brightness(1.2); border-color: #3b82f6; }
    .btn-unit:disabled { opacity: 0.3; filter: grayscale(80%); cursor: not-allowed; }
    .font-title { font-family: 'Black Han Sans', sans-serif; }
    
    .tooltip { 
      position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
      width: 140px; padding: 10px; border-radius: 12px; background: rgba(2, 6, 23, 0.9);
      border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 11px;
      opacity: 0; visibility: hidden; transition: all 0.3s; pointer-events: none; z-index: 100;
    }

    #warningFlash {
      animation: flashRed 0.5s infinite alternate;
      text-shadow: 0 0 20px rgba(239, 68, 68, 0.8);
    }
    @keyframes flashRed { from { opacity: 0.3; transform: scale(1); } to { opacity: 1; transform: scale(1.1); } }
  </style>
</head>
<body>

  <!-- 시작 화면 -->
  <div id="startScreen" class="fixed inset-0 z-40 bg-slate-950 flex flex-col items-center justify-center">
    <div class="text-center mb-12">
      <h1 class="text-7xl font-title text-white mb-4 tracking-tighter uppercase">Total War</h1>
      <p class="text-slate-500 text-lg font-bold tracking-widest uppercase">Commander, The Line Must Hold</p>
    </div>
    <div class="text-slate-400 mb-8 text-sm flex gap-8">
      <p>⌨️ <span class="text-white font-bold">W,A,S,D</span> 이동</p>
      <p>⌨️ <span class="text-white font-bold">1 ~ 5</span> 연속 소환</p>
      <p>⌨️ <span class="text-white font-bold">SPACE (Hold)</span> 집결 명령</p>
    </div>
    <button onclick="startGame()" class="bg-blue-600 text-white px-12 py-4 rounded-full font-black text-xl shadow-xl hover:bg-blue-500 transition-all">전면전 시작</button>
  </div>

  <!-- 대규모 공습 경고 -->
  <div id="hordeWarning" class="fixed inset-0 pointer-events-none z-30 hidden flex items-center justify-center bg-red-900/20">
    <div id="warningFlash" class="text-center">
      <p class="text-red-500 font-black text-5xl mb-2">⚠️ WARNING: MASSIVE HORDE ⚠️</p>
      <p class="text-white font-bold text-2xl uppercase">전 구역 대규모 좀비 습격 발생!</p>
    </div>
  </div>

  <!-- 인게임 UI -->
  <div id="gameUI" class="hidden">
    <div class="fixed top-0 left-0 w-full p-6 flex justify-between items-start z-10 pointer-events-none">
      <div class="flex flex-col gap-4 pointer-events-auto">
        <div class="glass-panel p-4 rounded-2xl flex items-center gap-6 shadow-xl">
          <div class="text-center min-w-[80px]">
            <p class="text-[10px] text-slate-400 font-black uppercase">Resource</p>
            <p id="budgetDisplay" class="text-3xl font-black text-emerald-400">$300</p>
          </div>
          <div class="w-px h-10 bg-slate-700"></div>
          <div class="text-center min-w-[60px]">
            <p class="text-[10px] text-slate-400 font-black uppercase">Wave</p>
            <p id="waveDisplay" class="text-3xl font-black text-white">1</p>
          </div>
        </div>
      </div>

      <div id="respawnBox" class="hidden pointer-events-none">
        <div class="bg-red-900/80 px-8 py-3 rounded-full border border-red-500 shadow-2xl text-center">
          <p class="text-[10px] font-black text-red-200 uppercase">Hero Fallen</p>
          <p id="respawnTimeDisplay" class="text-3xl font-black text-white">30s</p>
        </div>
      </div>

      <div class="flex flex-col gap-3 pointer-events-auto">
        <div class="glass-panel p-4 rounded-2xl shadow-xl">
          <p class="text-[10px] text-blue-400 font-black mb-1 uppercase">HQ Integrity</p>
          <div class="w-64 h-3 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
            <div id="baseHpBar" class="h-full bg-blue-500 transition-all duration-300" style="width: 100%"></div>
          </div>
        </div>
        <div class="glass-panel p-4 rounded-2xl shadow-xl">
          <p class="text-[10px] text-slate-400 font-black mb-1 uppercase">Commander</p>
          <div class="w-64 h-2 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
            <div id="heroHpBar" class="h-full bg-slate-300 transition-all duration-300" style="width: 100%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 하단 유닛 생산 바 -->
    <div class="fixed bottom-0 left-0 w-full p-6 flex justify-center items-end gap-6 z-10 pointer-events-none">
      <div class="flex flex-col items-center gap-2 pointer-events-auto">
        <p id="rallyText" class="text-[10px] font-black text-slate-500 bg-slate-900/80 px-2 py-1 rounded">HOLD [SPACE] TO RALLY</p>
        <div id="skillRally" class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center border-4 border-slate-700 shadow-2xl transition-all">
          <span class="text-3xl">📢</span>
        </div>
      </div>

      <div class="glass-panel p-2 rounded-3xl flex gap-3 border-t-2 border-slate-700 pointer-events-auto shadow-2xl">
        <!-- 유닛 버튼들 (툴팁 포함) -->
        <button id="btn-knight" onclick="game.summonUnit('knight')" class="btn-unit w-20 h-24 bg-slate-900 rounded-xl flex flex-col items-center justify-center border-b-4 border-red-500">
          <div class="tooltip"><p class="font-bold text-red-400">검사</p><p>HP: 550 | ATK: 55</p><p>장점: 높은 방어력</p></div>
          <span class="text-2xl">⚔️</span><span class="text-sm font-black text-red-400">$30</span>
        </button>
        <button id="btn-soldier" onclick="game.summonUnit('soldier')" class="btn-unit w-20 h-24 bg-slate-900 rounded-xl flex flex-col items-center justify-center border-b-4 border-blue-500">
          <div class="tooltip"><p class="font-bold text-blue-400">보병</p><p>HP: 320 | ATK: 65</p><p>장점: 안정적 화력</p></div>
          <span class="text-2xl">🔫</span><span class="text-sm font-black text-blue-400">$60</span>
        </button>
        <button id="btn-sniper" onclick="game.summonUnit('sniper')" class="btn-unit w-20 h-24 bg-slate-900 rounded-xl flex flex-col items-center justify-center border-b-4 border-yellow-500">
          <div class="tooltip"><p class="font-bold text-yellow-400">스나이퍼</p><p>HP: 250 | ATK: 160</p><p>장점: 초장거리 저격</p></div>
          <span class="text-2xl">🔭</span><span class="text-sm font-black text-yellow-400">$120</span>
        </button>
        <button id="btn-bazooka" onclick="game.summonUnit('bazooka')" class="btn-unit w-20 h-24 bg-slate-900 rounded-xl flex flex-col items-center justify-center border-b-4 border-purple-500">
          <div class="tooltip"><p class="font-bold text-purple-400">바주카</p><p>HP: 380 | ATK: 110</p><p>장점: 범위 공격</p></div>
          <span class="text-2xl">🚀</span><span class="text-sm font-black text-purple-400">$200</span>
        </button>
        <button id="btn-tank" onclick="game.summonUnit('tank')" class="btn-unit w-20 h-24 bg-slate-900 rounded-xl flex flex-col items-center justify-center border-b-4 border-green-500">
          <div class="tooltip"><p class="font-bold text-green-400">탱크</p><p>HP: 2800 | ATK: 120</p><p>장점: 압도적 맷집</p></div>
          <span class="text-2xl">🚜</span><span class="text-sm font-black text-green-400">$500</span>
        </button>
      </div>
    </div>
  </div>

  <div id="resultScreen" class="fixed inset-0 bg-black/95 z-50 hidden flex-col items-center justify-center">
    <h2 class="text-8xl font-title text-red-600 mb-4 uppercase">Base Fallen</h2>
    <p class="text-white mb-8">지휘 기지가 완전히 파괴되었습니다.</p>
    <button onclick="location.reload()" class="bg-white text-black px-12 py-4 rounded-full font-black hover:scale-110 transition-transform">RETRY MISSION</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const COLORS = {
      HERO: '#ffffff', KNIGHT: '#f87171', SOLDIER: '#60a5fa', SNIPER: '#fbbf24', BAZOOKA: '#c084fc', TANK: '#4ade80',
      Z_NORM: '#4d7c0f', Z_SPIT: '#a3e635', Z_TANK: '#166534', Z_FAST: '#db2777', Z_BOSS: '#7f1d1d'
    };

    let cw, ch, GROUND_TOP, GROUND_BOTTOM;
    const WORLD_WIDTH = 5500; 

    function resize() {
      cw = window.innerWidth; ch = window.innerHeight;
      canvas.width = cw; canvas.height = ch;
      GROUND_TOP = ch * 0.35; 
      GROUND_BOTTOM = ch * 0.92;
    }
    window.addEventListener('resize', resize);
    resize();

    class Game {
      constructor() {
        this.budget = 300; 
        this.wave = 1;
        this.waveProgress = 0;
        this.waveDuration = 45;
        
        this.base = { x: 300, y: (GROUND_TOP+GROUND_BOTTOM)/2, hp: 15000, maxHp: 15000, radius: 250 };
        this.hero = { x: 600, y: (GROUND_TOP+GROUND_BOTTOM)/2, hp: 1500, maxHp: 1500, speed: 450, radius: 25, isDead: false };
        this.units = []; this.zombies = []; this.bullets = [];
        this.cameraX = 0; this.keys = {}; this.lastTime = 0; this.spawnTimer = 0;
        this.isGameOver = false; this.rallyActive = false;
        
        this.respawnBaseTime = 30; this.deathCount = 0; this.respawnTimer = 0;
        this.unitSummonTimer = 0;
        this.isHordeComing = false;
        this.hordeTimer = 0;
        this.lastHordeWave = 0;

        // 구역 설정 (요청사항 반영)
        this.zones = [
          { name: 'Asphalt', start: 0, end: 1500, color: '#1e293b' },
          { name: 'Warzone', start: 1500, end: 3200, color: '#334155' },
          { name: 'Wasteland', start: 3200, end: 4700, color: '#451a03' },
          { name: 'Infested', start: 4700, end: WORLD_WIDTH, color: '#2d064a' } // 짧은 감염 구역
        ];

        this.props = [];
        this.initProps();

        window.addEventListener('keydown', e => {
          this.keys[e.code] = true;
          if (e.code === 'Space') this.rallyActive = true;
        });
        window.addEventListener('keyup', e => {
          this.keys[e.code] = false;
          if (e.code === 'Space') this.rallyActive = false;
        });
      }

      initProps() {
        // 교전지대 소품 (바리케이드, 철조망)
        for(let i=0; i<15; i++) {
          this.props.push({
            x: 1600 + Math.random() * 1400,
            y: GROUND_TOP + Math.random() * (GROUND_BOTTOM - GROUND_TOP),
            type: 'barricade', scale: 1
          });
        }
        // 황무지 시체 (불타는 효과용)
        for(let i=0; i<12; i++) {
          this.props.push({
            x: 3300 + Math.random() * 1300,
            y: GROUND_TOP + Math.random() * (GROUND_BOTTOM - GROUND_TOP),
            type: 'burning_body', scale: 1
          });
        }
      }

      summonUnit(type) {
        const specs = {
          knight: { cost: 30, color: COLORS.KNIGHT, hp: 550, dmg: 55, range: 80, cd: 0.5, speed: 220, radius: 18, weapon: 'sword' },
          soldier: { cost: 60, color: COLORS.SOLDIER, hp: 320, dmg: 65, range: 420, cd: 0.45, speed: 190, radius: 18, weapon: 'gun' },
          sniper: { cost: 120, color: COLORS.SNIPER, hp: 250, dmg: 160, range: 950, cd: 2.8, speed: 160, radius: 18, weapon: 'sniper' },
          bazooka: { cost: 200, color: COLORS.BAZOOKA, hp: 380, dmg: 110, range: 550, cd: 3.2, speed: 150, radius: 20, area: 160, weapon: 'launcher' },
          tank: { cost: 500, color: COLORS.TANK, hp: 2800, dmg: 120, range: 750, cd: 4.2, speed: 120, radius: 45, area: 260, weapon: 'cannon', isTank: true }
        };
        const s = specs[type];
        if (this.budget >= s.cost) {
          this.budget -= s.cost;
          this.units.push({
            ...s, type, x: 550 + Math.random()*100, y: GROUND_TOP + Math.random()*(GROUND_BOTTOM-GROUND_TOP), 
            curHp: s.hp, timer: 0, attackAnim: 0, 
            patrolTarget: { x: 1000 + Math.random()*1000, y: GROUND_TOP + Math.random()*(GROUND_BOTTOM-GROUND_TOP) }
          });
          return true;
        }
        return false;
      }

      spawnZombie(isHorde = false) {
        const w = Math.floor(this.wave);
        const types = [
          { name: '일반', hp: 100 + (w*20), dmg: 12 + (w*2), speed: 75, color: COLORS.Z_NORM, reward: 15, radius: 20, size: 1.0, minWave: 1, detectRange: 500 },
          { name: '원거리', hp: 70 + (w*12), dmg: 15 + (w*2), speed: 85, color: COLORS.Z_SPIT, reward: 25, radius: 22, size: 1.1, range: 480, minWave: 3, detectRange: 700 },
          { name: '헤비', hp: 400 + (w*80), dmg: 20 + (w*3), speed: 55, color: COLORS.Z_TANK, reward: 80, radius: 35, size: 1.5, area: 90, minWave: 5, detectRange: 600 },
          { name: '신속', hp: 90 + (w*15), dmg: 30 + (w*4), speed: 310, color: COLORS.Z_FAST, reward: 35, radius: 16, size: 0.85, minWave: 7, detectRange: 800 },
          { name: '대형', hp: 1000 + (w*200), dmg: 80 + (w*15), speed: 45, color: COLORS.Z_BOSS, reward: 600, radius: 70, size: 3.2, isBoss: true, minWave: 9, detectRange: 1200 }
        ];
        
        const available = types.filter(t => w >= t.minWave);
        const baseCount = isHorde ? 40 : 6;
        const count = baseCount + Math.floor(this.wave * 1.5);
        
        for(let i=0; i<count; i++) {
          const zT = available[Math.floor(Math.random() * available.length)];
          this.zombies.push({
            ...zT, x: WORLD_WIDTH + 150 + Math.random() * (isHorde ? 1500 : 500),
            y: GROUND_TOP + Math.random()*(GROUND_BOTTOM-GROUND_TOP),
            curHp: zT.hp, maxHp: zT.hp, timer: 0
          });
        }
      }

      update(dt) {
        if (this.isGameOver) return;
        
        // 입력 처리
        const summonInterval = 0.15;
        this.unitSummonTimer += dt;
        if (this.unitSummonTimer > summonInterval) {
          if (this.keys['Digit1']) this.summonUnit('knight');
          else if (this.keys['Digit2']) this.summonUnit('soldier');
          else if (this.keys['Digit3']) this.summonUnit('sniper');
          else if (this.keys['Digit4']) this.summonUnit('bazooka');
          else if (this.keys['Digit5']) this.summonUnit('tank');
          this.unitSummonTimer = 0;
        }

        this.budget += dt * (30 + this.wave * 5);
        this.waveProgress += dt;
        if (this.waveProgress >= this.waveDuration) {
          this.wave += 1; this.waveProgress = 0;
          this.waveDuration = Math.min(60, 45 + this.wave * 0.5);
        }

        // 호드 발생
        if (Math.floor(this.wave) % 5 === 0 && Math.floor(this.wave) !== this.lastHordeWave) {
          this.lastHordeWave = Math.floor(this.wave);
          this.isHordeComing = true; this.hordeTimer = 7;
          document.getElementById('hordeWarning').classList.remove('hidden');
          for(let i=0; i<5; i++) this.spawnZombie(true);
        }
        if (this.isHordeComing) {
          this.hordeTimer -= dt;
          if (this.hordeTimer <= 0) {
            this.isHordeComing = false;
            document.getElementById('hordeWarning').classList.add('hidden');
          }
        }

        // 영웅 관리
        if (this.hero.isDead) {
          this.respawnTimer -= dt;
          if (this.respawnTimer <= 0) {
            this.hero.isDead = false; this.hero.hp = this.hero.maxHp;
            this.hero.x = 600; this.hero.y = (GROUND_TOP+GROUND_BOTTOM)/2;
          }
        } else {
          if (this.keys['KeyA']) this.hero.x -= this.hero.speed * dt;
          if (this.keys['KeyD']) this.hero.x += this.hero.speed * dt;
          if (this.keys['KeyW']) this.hero.y -= this.hero.speed * dt;
          if (this.keys['KeyS']) this.hero.y += this.hero.speed * dt;
          this.hero.x = Math.max(500, Math.min(this.hero.x, WORLD_WIDTH - 20));
          this.hero.y = Math.max(GROUND_TOP + 10, Math.min(this.hero.y, GROUND_BOTTOM - 10));

          // 감염 지대 데미지 (X > 4700)
          if (this.hero.x > 4700) this.hero.hp -= 40 * dt;
          if (this.hero.hp <= 0) {
            this.hero.isDead = true; this.deathCount++;
            this.respawnTimer = 20 + (this.deathCount * 5);
          }
        }

        this.cameraX += ((this.hero.isDead ? 500 : this.hero.x) - cw/2 - this.cameraX) * 0.1;
        this.cameraX = Math.max(0, Math.min(this.cameraX, WORLD_WIDTH - cw));

        // 유닛 AI 및 구역 영향
        this.units.forEach(u => {
          if (u.timer > 0) u.timer -= dt;
          if (u.attackAnim > 0) u.attackAnim -= dt * 6;
          
          // 감염지대 도트 데미지
          if (u.x > 4700) u.curHp -= 30 * dt;

          this.applySeparation(u, this.units, dt);
          
          if (this.rallyActive && !this.hero.isDead) {
            const angle = Math.atan2(this.hero.y - u.y, this.hero.x - u.x);
            u.x += Math.cos(angle) * u.speed * 2.5 * dt;
            u.y += Math.sin(angle) * u.speed * 2.5 * dt;
          } else {
            // 자율 행동: 감염지대(4700+)를 피하려는 경향 추가
            const target = this.zombies.find(z => Math.sqrt((z.x-u.x)**2 + (z.y-u.y)**2) < u.range + 50);
            if (target) {
              const dist = Math.sqrt((target.x-u.x)**2 + (target.y-u.y)**2);
              if (dist < u.range) {
                if (u.timer <= 0) {
                  u.attackAnim = 1.0;
                  if (u.weapon === 'sword') target.curHp -= u.dmg;
                  else this.bullets.push({ x: u.x, y: u.y-40, tx: target.x, ty: target.y-30, speed: 2000, dmg: u.dmg, isAlly: true, color: u.color, area: u.area });
                  u.timer = u.cd;
                }
              } else {
                const angle = Math.atan2(target.y - u.y, target.x - u.x);
                // 감염지대에 너무 깊게 들어가지 않게 함
                if (u.x < 4650 || target.x < 4800) {
                    u.x += Math.cos(angle) * u.speed * dt;
                    u.y += Math.sin(angle) * u.speed * dt;
                }
              }
            } else {
              // 순찰: 감염지대 근처로 가지 않도록 타겟 조정
              if (!u.patrolTarget || Math.sqrt((u.patrolTarget.x-u.x)**2+(u.patrolTarget.y-u.y)**2) < 50 || u.patrolTarget.x > 4650) {
                u.patrolTarget = { x: 700 + Math.random() * 3800, y: GROUND_TOP + Math.random()*(GROUND_BOTTOM-GROUND_TOP) };
              }
              const angle = Math.atan2(u.patrolTarget.y - u.y, u.patrolTarget.x - u.x);
              u.x += Math.cos(angle) * (u.speed * 0.7) * dt; u.y += Math.sin(angle) * (u.speed * 0.7) * dt;
            }
          }
          u.y = Math.max(GROUND_TOP, Math.min(u.y, GROUND_BOTTOM));
        });

        // 좀비 AI 및 감염 버프
        this.zombies.forEach(z => {
          if (z.timer > 0) z.timer -= dt;
          
          let powerMult = 1.0;
          let speedMult = 1.0;
          if (z.x > 4700) { powerMult = 1.8; speedMult = 1.4; } // 감염지대 버프

          let target = null;
          let minDist = 2000;
          const enemies = [...this.units]; if (!this.hero.isDead) enemies.push(this.hero);
          enemies.forEach(p => {
            const d = Math.sqrt((p.x-z.x)**2 + (p.y-z.y)**2);
            if (d < z.detectRange && d < minDist) { minDist = d; target = p; }
          });

          const dBase = Math.sqrt((this.base.x-z.x)**2 + (this.base.y-z.y)**2);
          if (dBase < 500) target = this.base;

          if (target) {
            const dist = Math.sqrt((target.x-z.x)**2 + (target.y-z.y)**2);
            const range = target === this.base ? 350 : (z.range || 85);
            if (dist < range) {
              if (z.timer <= 0) {
                const totalDmg = z.dmg * powerMult;
                if (z.range > 150) this.bullets.push({ x: z.x, y: z.y-40, tx: target.x, ty: target.y-20, speed: 900, dmg: totalDmg, isAlly: false, color: z.color });
                else {
                  if (target === this.base) this.base.hp -= totalDmg;
                  else if (target === this.hero) this.hero.hp -= totalDmg;
                  else target.curHp -= totalDmg;
                }
                z.timer = 1.3;
              }
            } else {
              const angle = Math.atan2(target.y - z.y, target.x - z.x);
              z.x += Math.cos(angle) * (z.speed * speedMult) * dt;
              z.y += Math.sin(angle) * (z.speed * speedMult) * dt;
            }
          } else {
            const angle = Math.atan2(this.base.y - z.y, this.base.x - z.x);
            z.x += Math.cos(angle) * (z.speed * speedMult) * dt;
            z.y += Math.sin(angle) * (z.speed * speedMult) * dt;
          }
          z.y = Math.max(GROUND_TOP, Math.min(z.y, GROUND_BOTTOM));
        });

        this.bullets.forEach(b => {
          const dx = b.tx-b.x, dy = b.ty-b.y; const dist = Math.sqrt(dx*dx+dy*dy);
          b.x += (dx/dist) * b.speed * dt; b.y += (dy/dist) * b.speed * dt;
          if (dist < 40) {
            b.dead = true;
            if (b.isAlly) {
              if (b.area) this.zombies.forEach(z => { if (Math.sqrt((z.x-b.x)**2+(z.y-b.y)**2) < b.area) z.curHp -= b.dmg; });
              else { const h = this.zombies.find(z => Math.sqrt((z.x-b.x)**2+(z.y-b.y)**2) < 80); if (h) h.curHp -= b.dmg; }
            } else {
              if (!this.hero.isDead && Math.sqrt((this.hero.x-b.x)**2+(this.hero.y-b.y)**2) < 60) this.hero.hp -= b.dmg;
              if (Math.sqrt((this.base.x-b.x)**2+(this.base.y-b.y)**2) < 300) this.base.hp -= b.dmg;
              this.units.forEach(u => { if (Math.sqrt((u.x-b.x)**2+(u.y-b.y)**2) < 60) u.curHp -= b.dmg; });
            }
          }
        });

        this.zombies = this.zombies.filter(z => z.curHp > 0 ? true : (this.budget += z.reward, false));
        this.units = this.units.filter(u => u.curHp > 0);
        this.bullets = this.bullets.filter(b => !b.dead);

        this.spawnTimer += dt;
        if (this.spawnTimer > Math.max(0.4, 2.5 - (this.wave * 0.15))) {
          this.spawnZombie(); this.spawnTimer = 0;
        }

        if (this.base.hp <= 0) { this.isGameOver = true; document.getElementById('resultScreen').classList.replace('hidden', 'flex'); }
        this.updateUI();
      }

      applySeparation(entity, others, dt) {
        others.forEach(other => {
          if (entity === other) return;
          const dx = entity.x - other.x, dy = entity.y - other.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const minDist = entity.radius + other.radius + 10;
          if (dist < minDist && dist > 0) {
            const force = (minDist - dist) / minDist;
            entity.x += (dx/dist) * force * 200 * dt;
            entity.y += (dy/dist) * force * 200 * dt;
          }
        });
      }

      updateUI() {
        document.getElementById('budgetDisplay').innerText = `$${Math.floor(this.budget)}`;
        document.getElementById('waveDisplay').innerText = Math.floor(this.wave);
        document.getElementById('baseHpBar').style.width = `${(this.base.hp/this.base.maxHp)*100}%`;
        document.getElementById('heroHpBar').style.width = `${(this.hero.hp/this.hero.maxHp)*100}%`;
        
        if (this.hero.isDead) {
          document.getElementById('respawnBox').classList.remove('hidden');
          document.getElementById('respawnTimeDisplay').innerText = `${Math.ceil(this.respawnTimer)}s`;
        } else {
          document.getElementById('respawnBox').classList.add('hidden');
        }
      }

      drawBackground() {
        this.zones.forEach(z => {
          ctx.fillStyle = z.color;
          ctx.fillRect(z.start, GROUND_TOP, z.end - z.start, GROUND_BOTTOM - GROUND_TOP);
          
          // 경계선
          ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(z.end, GROUND_TOP); ctx.lineTo(z.end, GROUND_BOTTOM); ctx.stroke();
        });

        // 1구역 디테일 (차선)
        ctx.strokeStyle = '#334155'; ctx.setLineDash([20, 20]);
        ctx.beginPath(); ctx.moveTo(0, (GROUND_TOP+GROUND_BOTTOM)/2); ctx.lineTo(1500, (GROUND_TOP+GROUND_BOTTOM)/2); ctx.stroke();
        ctx.setLineDash([]);

        // 4구역 디테일 (감염 포자)
        const z4 = this.zones[3];
        for(let i=0; i<15; i++) {
          ctx.fillStyle = 'rgba(168, 85, 247, 0.15)';
          const px = z4.start + (Math.sin(Date.now()/1000 + i)*z4.end/10);
          ctx.beginPath(); ctx.arc(z4.start + Math.random()*(z4.end-z4.start), GROUND_TOP + Math.random()*(GROUND_BOTTOM-GROUND_TOP), 20, 0, Math.PI*2); ctx.fill();
        }
      }

      drawBase() {
        const b = this.base;
        ctx.save(); ctx.translate(b.x, b.y);
        ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.ellipse(0, 0, 300, 200, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 6; ctx.beginPath();
        for(let i=0; i<8; i++) {
          const a = (Math.PI/4)*i; ctx.lineTo(Math.cos(a)*250, Math.sin(a)*160);
        }
        ctx.closePath(); ctx.stroke();
        ctx.fillStyle = 'rgba(59, 130, 246, 0.1)'; ctx.fill();
        ctx.fillStyle = '#1e293b'; ctx.fillRect(-100, -140, 200, 140);
        ctx.strokeStyle = '#60a5fa'; ctx.strokeRect(-100, -140, 200, 140);
        ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(60, -200 + Math.sin(Date.now()/200)*5, 6, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }

      draw() {
        ctx.clearRect(0, 0, cw, ch);
        ctx.save(); ctx.translate(-this.cameraX, 0);

        this.drawBackground();

        // 소품 그리기
        this.props.forEach(p => {
          if (p.type === 'barricade') {
            ctx.fillStyle = '#475569'; ctx.fillRect(p.x, p.y-10, 40, 20);
            ctx.strokeStyle = '#1e293b'; ctx.strokeRect(p.x, p.y-10, 40, 20);
            // 철조망 느낌
            ctx.strokeStyle = '#94a3b8'; ctx.beginPath();
            for(let j=0; j<5; j++) { ctx.arc(p.x+j*8, p.y-15, 6, 0, Math.PI*2); } ctx.stroke();
          } else if (p.type === 'burning_body') {
            ctx.fillStyle = '#2d1a0a'; ctx.fillRect(p.x, p.y-5, 25, 10);
            // 불 파티클
            const fireSize = 5 + Math.random()*10;
            ctx.fillStyle = Math.random() > 0.5 ? '#f97316' : '#ef4444';
            ctx.beginPath(); ctx.arc(p.x+12, p.y-5-Math.random()*15, fireSize/2, 0, Math.PI*2); ctx.fill();
          }
        });

        this.drawBase();

        const entities = [...this.units, ...this.zombies];
        if (!this.hero.isDead) entities.push(this.hero);
        entities.sort((a,b)=>a.y-b.y);

        entities.forEach(e => {
          ctx.save(); ctx.translate(e.x, e.y);
          if (e === this.hero) {
            ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0,0, 25, 12, 0,0, Math.PI*2); ctx.fill();
            ctx.fillStyle = COLORS.HERO; ctx.fillRect(-18, -65, 36, 65);
            ctx.fillStyle = '#cbd5e1'; ctx.beginPath(); ctx.arc(0, -82, 14, 0, Math.PI*2); ctx.fill();
          } else if (e.weapon) {
            ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0,0, 18, 9, 0,0, Math.PI*2); ctx.fill();
            ctx.fillStyle = e.color; 
            if (e.isTank) {
              ctx.fillRect(-75, -60, 150, 60); ctx.fillStyle = '#111'; ctx.fillRect(30, -48, 80, 18);
              if (e.attackAnim > 0) { ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(110, -39, 25*e.attackAnim, 0, Math.PI*2); ctx.fill(); }
            } else {
              ctx.fillRect(-15, -50, 30, 50); ctx.fillStyle = '#f1f5f9'; ctx.beginPath(); ctx.arc(0, -62, 12, 0, Math.PI*2); ctx.fill();
              const anim = e.attackAnim > 0 ? Math.sin(e.attackAnim * 5) * 20 : 0;
              if (e.weapon === 'sword') { ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(15, -30); ctx.lineTo(40 + anim, -55 - anim); ctx.stroke(); }
              else if (e.weapon === 'gun') { ctx.fillStyle = '#333'; ctx.fillRect(10, -35, 35, 8); if (e.attackAnim > 0) { ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(45, -31, 6, 0, Math.PI*2); ctx.fill(); } }
              else if (e.weapon === 'sniper') { ctx.fillStyle = '#111'; ctx.fillRect(5, -42, 65, 7); }
              else if (e.weapon === 'launcher') { ctx.fillStyle = '#2d3748'; ctx.fillRect(-5, -48, 55, 16); }
            }
            ctx.fillStyle = '#000'; ctx.fillRect(-25, -95, 50, 6);
            ctx.fillStyle = e.color; ctx.fillRect(-25, -95, (e.curHp/e.hp)*50, 6);
          } else {
            // 좀비
            const s = e.size;
            ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0,0, 20*s, 10*s, 0,0, Math.PI*2); ctx.fill();
            ctx.fillStyle = e.color; ctx.fillRect(-15*s, -50*s, 30*s, 50*s);
            ctx.fillStyle = '#94a3b8'; ctx.beginPath(); ctx.arc(0, -62*s, 12*s, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.fillRect(-30*s, -90*s, 60*s, 7);
            ctx.fillStyle = '#ef4444'; ctx.fillRect(-30*s, -90*s, (e.curHp/e.maxHp)*60*s, 7);
            // 감염지대 버프 오라
            if (e.x > 4700) {
              ctx.strokeStyle = 'rgba(168, 85, 247, 0.5)'; ctx.lineWidth = 3;
              ctx.strokeRect(-20*s, -70*s, 40*s, 75*s);
            }
          }
          ctx.restore();
        });

        this.bullets.forEach(b => {
          ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.area?18:8, 0, Math.PI*2); ctx.fill();
        });

        if (this.rallyActive && !this.hero.isDead) {
          ctx.strokeStyle = 'rgba(59, 130, 246, 0.4)'; ctx.lineWidth = 8;
          ctx.beginPath(); ctx.arc(this.hero.x, this.hero.y, 140 * (1+Math.sin(Date.now()/120)*0.2), 0, Math.PI*2); ctx.stroke();
        }
        ctx.restore();
      }
    }

    const game = new Game();
    function startGame() {
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('gameUI').classList.remove('hidden');
      requestAnimationFrame(tick);
    }
    function tick(t) {
      const dt = Math.min(0.1, (t - game.lastTime)/1000);
      game.lastTime = t;
      game.update(dt); game.draw();
      requestAnimationFrame(tick);
    }
  </script>
</body>
