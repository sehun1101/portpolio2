<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초정밀 실시간 멀티플레이어 술래잡기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { background-color: #f1f5f9; color: #1e293b; user-select: none; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        #game-container { width: 1100px; height: 700px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); background: white; }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }
        canvas { background-color: #fcfcfc; background-image: radial-gradient(#e2e8f0 1.5px, transparent 1.5px); background-size: 30px 30px; cursor: crosshair; }
        .lobby-overlay { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); }
        .color-dot { width: 36px; height: 36px; border-radius: 12px; cursor: pointer; border: 3px solid transparent; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .color-dot.active { border-color: #0f172a; transform: scale(1.1) rotate(5deg); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .shape-btn { padding: 12px 20px; border-radius: 14px; border: 2px solid #f1f5f9; cursor: pointer; transition: all 0.2s; font-weight: 700; background: white; }
        .shape-btn.active { border-color: #0f172a; background: #0f172a; color: white; }
        .player-label { pointer-events: none; transition: transform 0.1s ease-out; }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center flex-col">

    <div class="relative rounded-[2.5rem] overflow-hidden flex border-[12px] border-white shadow-2xl" id="game-container">
        <!-- Main Game Area -->
        <div class="relative flex-1">
            <canvas id="gameCanvas" width="800" height="700"></canvas>
            
            <!-- Top Right UI -->
            <div class="absolute top-6 right-6 flex gap-3 z-40">
                <button id="back-to-lobby" class="bg-white/90 hover:bg-white px-6 py-3 rounded-2xl shadow-lg text-sm font-black flex items-center gap-2 transition-all transform hover:scale-105 hidden border border-slate-100">
                    <i class="fas fa-paint-brush text-indigo-500"></i> 꾸미기
                </button>
            </div>

            <!-- Lobby Overlay -->
            <div id="lobby-screen" class="absolute inset-0 lobby-overlay flex items-center justify-center z-50 transition-opacity duration-300">
                <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-[480px] text-center border border-slate-100 ring-1 ring-slate-100">
                    <div class="mb-8">
                        <span class="bg-indigo-100 text-indigo-600 px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest">Multiplayer Tag</span>
                        <h2 class="text-5xl font-[900] mt-3 text-slate-900 tracking-tight">캐릭터 커스텀</h2>
                    </div>
                    
                    <div class="space-y-8">
                        <!-- Nickname -->
                        <div class="text-left">
                            <label class="block text-xs font-black text-slate-400 uppercase mb-3 ml-1 tracking-wider">닉네임 설정</label>
                            <input type="text" id="nickname-input" maxlength="10" placeholder="닉네임을 입력하세요" class="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl outline-none focus:border-indigo-400 transition-all text-xl font-bold shadow-inner">
                        </div>

                        <!-- Color Picker -->
                        <div class="text-left">
                            <label class="block text-xs font-black text-slate-400 uppercase mb-3 ml-1 tracking-wider">색상 테마</label>
                            <div class="flex justify-between" id="color-picker">
                                <div class="color-dot active" data-color="#6366f1" style="background: #6366f1;"></div>
                                <div class="color-dot" data-color="#10b981" style="background: #10b981;"></div>
                                <div class="color-dot" data-color="#f59e0b" style="background: #f59e0b;"></div>
                                <div class="color-dot" data-color="#ef4444" style="background: #ef4444;"></div>
                                <div class="color-dot" data-color="#ec4899" style="background: #ec4899;"></div>
                                <div class="color-dot" data-color="#06b6d4" style="background: #06b6d4;"></div>
                                <div class="color-dot" data-color="#1e293b" style="background: #1e293b;"></div>
                            </div>
                        </div>

                        <!-- Shape Picker -->
                        <div class="text-left">
                            <label class="block text-xs font-black text-slate-400 uppercase mb-3 ml-1 tracking-wider">캐릭터 형태</label>
                            <div class="grid grid-cols-2 gap-4">
                                <button class="shape-btn active" data-shape="circle"><i class="fas fa-circle mr-2"></i> 동그라미</button>
                                <button class="shape-btn" data-shape="square"><i class="fas fa-square mr-2"></i> 네모네모</button>
                            </div>
                        </div>
                    </div>

                    <button id="start-game-btn" class="w-full mt-10 bg-indigo-600 text-white p-6 rounded-2xl font-black text-2xl hover:bg-indigo-700 transform hover:-translate-y-1 transition-all shadow-xl shadow-indigo-200">
                        전장 입장하기
                    </button>
                </div>
            </div>

            <!-- Loading Info -->
            <div id="loading-overlay" class="absolute inset-0 bg-slate-900 flex items-center justify-center z-[60]">
                <div class="text-center">
                    <div class="relative w-20 h-20 mx-auto mb-6">
                        <div class="absolute inset-0 border-4 border-indigo-500/20 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-t-indigo-500 rounded-full animate-spin"></div>
                    </div>
                    <p class="text-white font-black text-xl tracking-widest">SERVER CONNECTING</p>
                    <p class="text-slate-400 text-sm mt-2">안정적인 멀티플레이 환경을 구축 중입니다...</p>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="w-[300px] bg-slate-50 flex flex-col border-l border-slate-100">
            <div class="p-8 bg-white border-b border-slate-100">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-[10px] text-slate-400 font-black uppercase tracking-widest">내 역할</span>
                    <div id="ping-display" class="text-[10px] font-bold text-emerald-500">SERVER OK</div>
                </div>
                <div id="my-role-display" class="font-black text-3xl text-slate-300 italic">READY</div>
                <div id="tagger-info" class="text-xs mt-3 text-slate-400 font-medium">현재 술래를 찾는 중...</div>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden">
                <div class="px-8 py-4 flex justify-between items-center">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">온라인 플레이어</span>
                    <span id="player-count" class="bg-indigo-600 text-white px-3 py-1 rounded-full text-[10px] font-black">0</span>
                </div>
                <div id="chat-box" class="flex-1 px-8 py-2 overflow-y-auto space-y-4"></div>
                <div class="p-6 bg-white border-t border-slate-100">
                    <div class="relative">
                        <input type="text" id="chat-input" placeholder="메시지 입력..." class="w-full bg-slate-100 p-4 pr-12 rounded-2xl outline-none focus:ring-2 ring-indigo-100 transition-all text-sm font-medium">
                        <button onclick="sendChat()" class="absolute right-3 top-3 text-indigo-400 hover:text-indigo-600 p-1">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Configuration ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'advanced-multi-tag-v2';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let user = null;
        let players = {};
        let gameState = { taggerId: null };
        let isGameStarted = false;
        let lastTagAction = 0; // 태그 쿨타임
        
        let myProfile = {
            nickname: localStorage.getItem('tag_v2_nick') || '플레이어',
            color: '#6366f1',
            shape: 'circle'
        };

        const PLAYER_SIZE = 22;
        const SPEED = { normal: 5, tagger: 5.8 };
        let myPos = { x: 400, y: 350 };
        const keys = {};

        const obstacles = [
            { x: 150, y: 150, w: 500, h: 25 },
            { x: 150, y: 525, w: 500, h: 25 },
            { x: 100, y: 200, w: 25, h: 300 },
            { x: 675, y: 200, w: 25, h: 300 },
            { x: 350, y: 300, w: 100, h: 100 }
        ];

        async function start() {
            document.getElementById('nickname-input').value = myProfile.nickname;
            
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error(e); }

            onAuthStateChanged(auth, (u) => {
                if (u) {
                    user = u;
                    document.getElementById('loading-overlay').style.display = 'none';
                    setupSync();
                    gameLoop();
                }
            });
        }

        // Lobby Logic
        document.querySelectorAll('.color-dot').forEach(el => {
            el.onclick = () => {
                document.querySelector('.color-dot.active').classList.remove('active');
                el.classList.add('active');
                myProfile.color = el.dataset.color;
            };
        });

        document.querySelectorAll('.shape-btn').forEach(el => {
            el.onclick = () => {
                document.querySelector('.shape-btn.active').classList.remove('active');
                el.classList.add('active');
                myProfile.shape = el.dataset.shape;
            };
        });

        document.getElementById('start-game-btn').onclick = () => {
            const n = document.getElementById('nickname-input').value.trim();
            myProfile.nickname = n || '무명전사';
            localStorage.setItem('tag_v2_nick', myProfile.nickname);
            
            isGameStarted = true;
            document.getElementById('lobby-screen').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('back-to-lobby').classList.remove('hidden');
            
            // Initial spawn
            if (gameState.taggerId === user.uid) {
                myPos = { x: 100, y: 600 };
            } else {
                myPos = { x: 700, y: 100 };
            }
        };

        document.getElementById('back-to-lobby').onclick = () => {
            isGameStarted = false;
            document.getElementById('lobby-screen').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('back-to-lobby').classList.add('hidden');
        };

        // Network Sync (The "Server" part)
        function setupSync() {
            // 1. Game State Listener
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'game', 'state'), (s) => {
                if (s.exists()) {
                    const oldTagger = gameState.taggerId;
                    gameState = s.data();
                    if (oldTagger !== gameState.taggerId && gameState.taggerId === user.uid) {
                        // 내가 술래가 됨 -> 왼쪽 아래 스폰
                        myPos = { x: 100, y: 600 };
                    }
                    updateUI();
                } else {
                    initGameState();
                }
            });

            // 2. Players Listener
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'players'), (s) => {
                const now = Date.now();
                players = {};
                s.docs.forEach(d => {
                    const data = d.data();
                    if (now - data.hb < 8000) players[d.id] = data;
                });
                document.getElementById('player-count').innerText = Object.keys(players).length;
                
                // 술래가 나갔다면 자동 선출
                if (Object.keys(players).length > 0 && (!gameState.taggerId || !players[gameState.taggerId])) {
                    setTagger(Object.keys(players).sort()[0]);
                }
            });

            // 3. Heartbeat & Position Update
            setInterval(() => {
                if (!user) return;
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid), {
                    ...myProfile,
                    x: myPos.x,
                    y: myPos.y,
                    active: isGameStarted,
                    hb: Date.now()
                }, { merge: true });
            }, 60);

            // 4. Chat Listener
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'chat'), (s) => {
                const msgs = s.docs.map(d => d.data()).sort((a,b) => a.t - b.t);
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                msgs.slice(-40).forEach(m => {
                    const d = document.createElement('div');
                    if (m.sys) {
                        d.className = "text-[11px] font-black text-indigo-400 bg-indigo-50 p-2 rounded-xl text-center";
                        d.innerHTML = `<i class="fas fa-bullhorn mr-2"></i>${m.txt}`;
                    } else {
                        const isMe = m.uid === user.uid;
                        d.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
                        d.innerHTML = `
                            <span class="text-[9px] font-bold text-slate-400 mb-1 ml-1">${m.nick}</span>
                            <div class="px-4 py-2 rounded-2xl text-sm font-medium shadow-sm border ${isMe ? 'bg-indigo-600 text-white border-indigo-500' : 'bg-white text-slate-700 border-slate-100'}">${m.txt}</div>
                        `;
                    }
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        async function initGameState() {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'game', 'state'), { taggerId: user.uid });
        }

        async function setTagger(uid) {
            if (Date.now() - lastTagAction < 1500) return; // 전역 태그 쿨타임
            lastTagAction = Date.now();
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'game', 'state'), { taggerId: uid });
        }

        function updateUI() {
            const isTagger = gameState.taggerId === user.uid;
            const display = document.getElementById('my-role-display');
            const info = document.getElementById('tagger-info');
            
            if (!isGameStarted) {
                display.innerText = "READY";
                display.className = "font-black text-3xl text-slate-300 italic";
                info.innerText = "입장 버튼을 눌러주세요";
                return;
            }

            if (isTagger) {
                display.innerText = "TAGGER";
                display.className = "font-black text-4xl text-red-500 animate-pulse italic tracking-tighter";
                info.innerText = "다른 플레이어를 터치하세요!";
            } else {
                display.innerText = "RUNNER";
                display.className = "font-black text-4xl text-indigo-600 italic tracking-tighter";
                const tagger = players[gameState.taggerId];
                info.innerText = tagger ? `${tagger.nickname}님이 쫓아오고 있습니다!` : "술래를 피하세요!";
            }
        }

        // Gameplay Logic
        function move() {
            if (!isGameStarted) return;
            const isTagger = gameState.taggerId === user.uid;
            const s = isTagger ? SPEED.tagger : SPEED.normal;
            
            let nx = myPos.x;
            let ny = myPos.y;

            if (keys['w'] || keys['arrowup']) ny -= s;
            if (keys['s'] || keys['arrowdown']) ny += s;
            if (keys['a'] || keys['arrowleft']) nx -= s;
            if (keys['d'] || keys['arrowright']) nx += s;

            nx = Math.max(PLAYER_SIZE, Math.min(canvas.width - PLAYER_SIZE, nx));
            ny = Math.max(PLAYER_SIZE, Math.min(canvas.height - PLAYER_SIZE, ny));

            if (!checkObstacles(nx, ny)) {
                myPos.x = nx;
                myPos.y = ny;
            } else {
                if (!checkObstacles(nx, myPos.y)) myPos.x = nx;
                else if (!checkObstacles(myPos.x, ny)) myPos.y = ny;
            }
        }

        function checkObstacles(px, py) {
            for (const o of obstacles) {
                const cx = Math.max(o.x, Math.min(px, o.x + o.w));
                const cy = Math.max(o.y, Math.min(py, o.y + o.h));
                const d = Math.sqrt((px - cx)**2 + (py - cy)**2);
                if (d < PLAYER_SIZE) return true;
            }
            return false;
        }

        async function checkTag() {
            if (gameState.taggerId !== user.uid || !isGameStarted) return;
            for (let id in players) {
                if (id === user.uid || !players[id].active) continue;
                const p = players[id];
                const d = Math.sqrt((myPos.x - p.x)**2 + (myPos.y - p.y)**2);
                if (d < PLAYER_SIZE * 2) {
                    await setTagger(id);
                    await sysMsg(`${p.nickname}님이 새로운 술래가 되었습니다!`);
                    break;
                }
            }
        }

        async function sendChat() {
            const i = document.getElementById('chat-input');
            const v = i.value.trim();
            if (!v || !user) return;
            i.value = '';
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chat'), {
                uid: user.uid, nick: myProfile.nickname, txt: v, t: Date.now()
            });
        }

        async function sysMsg(txt) {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chat'), {
                sys: true, txt, t: Date.now()
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Obstacles
            ctx.fillStyle = "#ffffff";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(0,0,0,0.03)";
            obstacles.forEach(o => {
                ctx.beginPath();
                ctx.roundRect(o.x, o.y, o.w, o.h, 12);
                ctx.fill();
                ctx.strokeStyle = "#f1f5f9";
                ctx.lineWidth = 2;
                ctx.stroke();
            });
            ctx.shadowBlur = 0;

            // Players
            for (let id in players) {
                const p = players[id];
                if (!p.active && id !== user.uid) continue;
                if (id === user.uid && !isGameStarted) continue;

                const isMe = id === user.uid;
                const isTagger = gameState.taggerId === id;
                const pos = isMe ? myPos : p;

                // Name
                ctx.fillStyle = isTagger ? "#ef4444" : "#475569";
                ctx.font = `black 12px Pretendard`;
                ctx.textAlign = "center";
                ctx.fillText(p.nickname, pos.x, pos.y - 35);

                // Shadow
                ctx.beginPath();
                ctx.ellipse(pos.x, pos.y + 15, 12, 4, 0, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(0,0,0,0.06)";
                ctx.fill();

                // Character
                ctx.fillStyle = isTagger ? "#ef4444" : p.color;
                ctx.beginPath();
                if (p.shape === 'square') {
                    ctx.roundRect(pos.x - PLAYER_SIZE, pos.y - PLAYER_SIZE, PLAYER_SIZE * 2, PLAYER_SIZE * 2, 8);
                } else {
                    ctx.arc(pos.x, pos.y, PLAYER_SIZE, 0, Math.PI * 2);
                }
                ctx.fill();

                // Detail
                if (isTagger) {
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 5;
                    ctx.stroke();
                    // Glow
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, PLAYER_SIZE + 8, 0, Math.PI * 2);
                    ctx.strokeStyle = "rgba(239, 68, 68, 0.2)";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else if (isMe) {
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }
        }

        function gameLoop() {
            move();
            checkTag();
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
        document.getElementById('chat-input').onkeydown = (e) => {
            if (e.key === 'Enter') sendChat();
            e.stopPropagation();
        };

        start();
    </script>
</body>
</html>
