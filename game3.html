<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멀티플레이어 술래잡기: 커스텀 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f0f4f8; color: #1a202c; user-select: none; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        #game-container { width: 1100px; height: 700px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); background: white; }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 2px; }
        canvas { background-color: #ffffff; background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 40px 40px; }
        .lobby-overlay { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .color-dot.active { border-color: #1a202c; transform: scale(1.2); }
        .shape-btn { padding: 8px 16px; border-radius: 8px; border: 2px solid #e2e8f0; cursor: pointer; transition: all 0.2s; }
        .shape-btn.active { border-color: #1a202c; background: #f7fafc; }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center flex-col">

    <div class="relative rounded-3xl overflow-hidden flex border-8 border-white shadow-2xl" id="game-container">
        <!-- 메인 게임 영역 -->
        <div class="relative">
            <canvas id="gameCanvas" width="800" height="700"></canvas>
            
            <!-- 우측 상단 커스텀 버튼 -->
            <button id="back-to-lobby" class="absolute top-4 right-4 bg-white/90 hover:bg-white px-4 py-2 rounded-full shadow-md text-sm font-bold flex items-center gap-2 transition-all z-40 hidden">
                <i class="fas fa-paint-brush text-blue-500"></i> 커스텀
            </button>

            <!-- 로비/커스터마이징 오버레이 -->
            <div id="lobby-screen" class="absolute inset-0 lobby-overlay flex items-center justify-center z-50">
                <div class="bg-white p-10 rounded-3xl shadow-2xl w-[450px] text-center border border-gray-100">
                    <h2 class="text-4xl font-black mb-6 text-gray-800 tracking-tight">캐릭터 설정</h2>
                    
                    <div class="space-y-6">
                        <!-- 닉네임 입력 -->
                        <div class="text-left">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-2 ml-1">닉네임</label>
                            <input type="text" id="nickname-input" maxlength="8" placeholder="최대 8자" class="w-full bg-gray-50 border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-blue-400 transition-all text-lg font-bold">
                        </div>

                        <!-- 색상 선택 -->
                        <div class="text-left">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-2 ml-1">캐릭터 색상</label>
                            <div class="flex gap-3 mt-2" id="color-picker">
                                <div class="color-dot active" data-color="#3b82f6" style="background: #3b82f6;"></div>
                                <div class="color-dot" data-color="#10b981" style="background: #10b981;"></div>
                                <div class="color-dot" data-color="#f59e0b" style="background: #f59e0b;"></div>
                                <div class="color-dot" data-color="#8b5cf6" style="background: #8b5cf6;"></div>
                                <div class="color-dot" data-color="#ec4899" style="background: #ec4899;"></div>
                                <div class="color-dot" data-color="#06b6d4" style="background: #06b6d4;"></div>
                            </div>
                        </div>

                        <!-- 모양 선택 -->
                        <div class="text-left">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-2 ml-1">캐릭터 모양</label>
                            <div class="flex gap-3 mt-2">
                                <button class="shape-btn active" data-shape="circle"><i class="fas fa-circle mr-2"></i>원형</button>
                                <button class="shape-btn" data-shape="square"><i class="fas fa-square mr-2"></i>사각형</button>
                            </div>
                        </div>
                    </div>

                    <button id="start-game-btn" class="w-full mt-10 bg-gray-900 text-white p-5 rounded-2xl font-black text-xl hover:bg-black transform hover:-translate-y-1 transition-all shadow-xl">
                        게임 시작하기
                    </button>
                </div>
            </div>

            <div id="loading-overlay" class="absolute inset-0 bg-white/90 flex items-center justify-center z-[60]">
                <div class="text-center">
                    <i class="fas fa-circle-notch fa-spin text-5xl text-blue-500 mb-4"></i>
                    <p class="text-gray-500 font-bold">서버 연결 중...</p>
                </div>
            </div>
        </div>

        <!-- 사이드바: 정보 및 채팅 -->
        <div class="w-[300px] bg-gray-50 flex flex-col border-l border-gray-100">
            <div class="p-6 bg-white border-b border-gray-100">
                <div class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-1">현재 상태</div>
                <div id="my-role-display" class="font-black text-2xl text-blue-500">연결 대기</div>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden">
                <div class="px-6 py-4 flex justify-between items-center bg-gray-50/50">
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-tighter">실시간 채팅</span>
                    <span id="player-count" class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full text-[10px] font-bold">0명</span>
                </div>
                <div id="chat-box" class="flex-1 p-6 overflow-y-auto space-y-3 text-sm"></div>
                <div class="p-4 bg-white border-t border-gray-100">
                    <input type="text" id="chat-input" placeholder="메시지 보내기..." class="w-full bg-gray-100 p-3 rounded-xl outline-none focus:ring-2 ring-blue-100 transition-all text-sm">
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, getDoc, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase 초기화 ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tag-game-multiplayer-final';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let user = null;
        let players = {};
        let gameState = { taggerId: null };
        let isGameStarted = false;
        let isTaggerAssigning = false; // 중복 배정 방지 락
        
        let myProfile = {
            nickname: localStorage.getItem('tag_nickname') || '익명',
            color: '#3b82f6',
            shape: 'circle'
        };

        const PLAYER_RADIUS = 20;
        const NORMAL_SPEED = 4.5;
        const TAGGER_SPEED = 5.2;
        
        let myPos = { x: 720, y: 80 };
        const keys = { w: false, a: false, s: false, d: false };

        const obstacles = [
            { x: 200, y: 120, w: 400, h: 20 },
            { x: 100, y: 220, w: 20, h: 260 },
            { x: 680, y: 220, w: 20, h: 260 },
            { x: 200, y: 560, w: 400, h: 20 },
            { x: 325, y: 300, w: 150, h: 100 }
        ];

        async function init() {
            document.getElementById('nickname-input').value = myProfile.nickname;
            
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error", error);
            }

            onAuthStateChanged(auth, (userData) => {
                if (userData) {
                    user = userData;
                    document.getElementById('loading-overlay').classList.add('hidden');
                    listenToGameState();
                    listenToPlayers();
                    listenToChat();
                    startSync();
                    requestAnimationFrame(gameLoop);
                }
            });
        }

        // 로비 UI 이벤트
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                document.querySelector('.color-dot.active').classList.remove('active');
                dot.classList.add('active');
                myProfile.color = dot.dataset.color;
            });
        });

        document.querySelectorAll('.shape-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.shape-btn.active').classList.remove('active');
                btn.classList.add('active');
                myProfile.shape = btn.dataset.shape;
            });
        });

        document.getElementById('start-game-btn').addEventListener('click', () => {
            const nick = document.getElementById('nickname-input').value.trim();
            myProfile.nickname = nick || '익명';
            localStorage.setItem('tag_nickname', myProfile.nickname);
            
            isGameStarted = true;
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('back-to-lobby').classList.remove('hidden');
            
            // 전장에 투입될 때 위치 초기화
            if (gameState.taggerId === user.uid) {
                myPos = { x: 80, y: 620 };
            } else {
                myPos = { x: 720, y: 80 };
            }
        });

        document.getElementById('back-to-lobby').addEventListener('click', () => {
            isGameStarted = false;
            document.getElementById('lobby-screen').classList.remove('hidden');
            document.getElementById('back-to-lobby').classList.add('hidden');
        });

        function moveMyPlayer() {
            if (!user || !isGameStarted) return;
            const isTagger = gameState.taggerId === user.uid;
            const currentSpeed = isTagger ? TAGGER_SPEED : NORMAL_SPEED;
            
            let nextX = myPos.x;
            let nextY = myPos.y;

            if (keys.w) nextY -= currentSpeed;
            if (keys.s) nextY += currentSpeed;
            if (keys.a) nextX -= currentSpeed;
            if (keys.d) nextX += currentSpeed;

            nextX = Math.max(PLAYER_RADIUS, Math.min(canvas.width - PLAYER_RADIUS, nextX));
            nextY = Math.max(PLAYER_RADIUS, Math.min(canvas.height - PLAYER_RADIUS, nextY));

            if (!isColliding(nextX, nextY)) {
                myPos.x = nextX;
                myPos.y = nextY;
            } else {
                if (!isColliding(nextX, myPos.y)) myPos.x = nextX;
                else if (!isColliding(myPos.x, nextY)) myPos.y = nextY;
            }
        }

        function isColliding(px, py) {
            for (const obs of obstacles) {
                const closestX = Math.max(obs.x, Math.min(px, obs.x + obs.w));
                const closestY = Math.max(obs.y, Math.min(py, obs.y + obs.h));
                const dx = px - closestX;
                const dy = py - closestY;
                if ((dx * dx + dy * dy) < (PLAYER_RADIUS * PLAYER_RADIUS)) return true;
            }
            return false;
        }

        function startSync() {
            if (!user) return;
            // 50ms마다 내 정보 업데이트
            setInterval(async () => {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid);
                await setDoc(ref, {
                    uid: user.uid,
                    x: myPos.x,
                    y: myPos.y,
                    nickname: myProfile.nickname,
                    color: myProfile.color,
                    shape: myProfile.shape,
                    isActive: isGameStarted,
                    lastSeen: Date.now()
                }, { merge: true });
            }, 50);
        }

        function listenToPlayers() {
            const col = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            onSnapshot(col, async (snapshot) => {
                const now = Date.now();
                const updated = {};
                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    // 6초 이상 소식 없으면 오프라인 간주
                    if (now - data.lastSeen < 6000) {
                        updated[data.uid] = data;
                    }
                });
                players = updated;
                document.getElementById('player-count').innerText = `${Object.keys(players).length}명`;
                
                // 술래가 없거나 나갔다면 새로운 술래 선출 (가장 먼저 접속한 UID 기준)
                if (Object.keys(players).length > 0 && (!gameState.taggerId || !players[gameState.taggerId])) {
                    if (!isTaggerAssigning) {
                        const sortedIds = Object.keys(players).sort();
                        assignTagger(sortedIds[0]);
                    }
                }
            }, (err) => console.error("Player List Error:", err));
        }

        function listenToGameState() {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'status', 'current');
            onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    const prevTagger = gameState.taggerId;
                    gameState = snapshot.data();
                    
                    // 술래가 나로 변경되었을 때 즉시 왼쪽 아래로 이동
                    if (prevTagger !== gameState.taggerId && gameState.taggerId === user.uid) {
                        myPos = { x: 80, y: 620 };
                    }

                    const isTagger = gameState.taggerId === user.uid;
                    const display = document.getElementById('my-role-display');
                    if (!isGameStarted) {
                        display.innerText = "대기실 설정 중";
                        display.className = "font-black text-2xl text-gray-300";
                    } else {
                        display.innerText = isTagger ? "당신은 술래!" : "도망치세요!";
                        display.className = isTagger ? "font-black text-2xl text-red-500 animate-pulse" : "font-black text-2xl text-blue-500";
                    }
                }
            }, (err) => console.error("Game State Error:", err));
        }

        async function assignTagger(uid) {
            if (isTaggerAssigning) return;
            isTaggerAssigning = true;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'status', 'current');
                await setDoc(docRef, { taggerId: uid, lastTagTime: Date.now() });
            } catch (e) {
                console.error("Assign Tagger Error:", e);
            } finally {
                setTimeout(() => { isTaggerAssigning = false; }, 1000); // 연속 배정 방지 쿨다운
            }
        }

        async function checkTagCollision() {
            // 내가 술래이고 게임 중일 때만 체크
            if (!user || !isGameStarted || gameState.taggerId !== user.uid) return;
            
            for (let id in players) {
                if (id === user.uid || !players[id].isActive) continue;
                
                const p = players[id];
                const dx = myPos.x - p.x;
                const dy = myPos.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // 충돌 판정 (두 플레이어 반지름 합보다 작을 때)
                if (dist < 38) {
                    await assignTagger(id);
                    await sendSystemMessage(`${p.nickname} 플레이어가 술래가 되었습니다!`);
                    break;
                }
            }
        }

        function listenToChat() {
            const chatCol = collection(db, 'artifacts', appId, 'public', 'data', 'chat');
            onSnapshot(chatCol, (snapshot) => {
                // 실시간 동기화를 위해 전체 메시지를 읽어 시간순 정렬
                const messages = snapshot.docs.map(doc => doc.data()).sort((a,b) => (a.time || 0) - (b.time || 0));
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = "";
                messages.slice(-30).forEach(msg => {
                    const div = document.createElement('div');
                    if (msg.sender === 'SYSTEM') {
                        div.className = "text-[11px] text-orange-400 font-bold text-center py-1 bg-orange-50/50 rounded-lg";
                        div.innerText = `📢 ${msg.text}`;
                    } else {
                        div.className = "bg-white p-3 rounded-2xl shadow-sm border border-gray-50 mb-1";
                        div.innerHTML = `<div class="text-[10px] font-black text-gray-300 mb-0.5">${msg.nickname}</div><div class="text-gray-700 leading-tight">${msg.text}</div>`;
                    }
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }, (err) => console.error("Chat Error:", err));
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !user) return;
            input.value = "";
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chat'), {
                    sender: user.uid, nickname: myProfile.nickname, text: text, time: Date.now()
                });
            } catch (e) { console.error("Send Chat Error:", e); }
        }

        async function sendSystemMessage(text) {
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chat'), {
                    sender: 'SYSTEM', text: text, time: Date.now()
                });
            } catch (e) { console.error("System Msg Error:", e); }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 지형 그리기
            ctx.fillStyle = "#f8fafc";
            ctx.strokeStyle = "#f1f5f9";
            ctx.lineWidth = 2;
            obstacles.forEach(obs => {
                ctx.beginPath();
                ctx.roundRect(obs.x, obs.y, obs.w, obs.h, 8);
                ctx.fill();
                ctx.stroke();
            });

            // 플레이어 그리기
            for (let id in players) {
                const p = players[id];
                // 활성화되지 않은 플레이어는 그리지 않음 (로비에 있는 사람)
                if (!p.isActive && id !== user.uid) continue;
                if (id === user.uid && !isGameStarted) continue;

                // 내 위치는 서버 지연 방지를 위해 로컬 좌표 사용
                const drawPos = (id === user.uid) ? myPos : p;
                const isTagger = gameState.taggerId === id;

                // 그림자
                ctx.beginPath();
                ctx.ellipse(drawPos.x, drawPos.y + 12, 12, 5, 0, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(0,0,0,0.05)";
                ctx.fill();

                // 몸체
                ctx.fillStyle = isTagger ? "#ef4444" : (p.color || '#3b82f6');
                ctx.beginPath();
                if (p.shape === 'square') {
                    ctx.roundRect(drawPos.x - PLAYER_RADIUS, drawPos.y - PLAYER_RADIUS, PLAYER_RADIUS * 2, PLAYER_RADIUS * 2, 6);
                } else {
                    ctx.arc(drawPos.x, drawPos.y, PLAYER_RADIUS, 0, Math.PI * 2);
                }
                ctx.fill();
                
                // 닉네임
                ctx.fillStyle = "#334155";
                ctx.font = "bold 12px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(p.nickname || "익명", drawPos.x, drawPos.y - 32);

                // 술래 이펙트
                if (isTagger) {
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(drawPos.x, drawPos.y, PLAYER_RADIUS + 6, 0, Math.PI * 2);
                    ctx.strokeStyle = "rgba(239, 68, 68, 0.3)";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        }

        function gameLoop() {
            moveMyPlayer();
            checkTagCollision();
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) {
                keys[key] = true;
                if (['w', 'a', 's', 'd'].includes(key)) e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChat();
        });

        init();
    </script>
</body>
</html>
