<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멀티플레이어 TDS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #1a202c; color: white; user-select: none; }
        #game-container { width: 950px; height: 600px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 2px; }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center overflow-hidden flex-col">

    <div class="mb-2 text-center">
        <h1 class="text-2xl font-bold text-yellow-400 tracking-tighter">CO-OP TOWER DEFENSE</h1>
        <p class="text-gray-400 text-xs">다른 플레이어와 함께 기지를 지키세요!</p>
    </div>

    <!-- 게임 컨테이너 -->
    <div class="relative bg-gray-900 rounded-xl overflow-hidden flex" id="game-container">
        
        <!-- 왼쪽: 캔버스 영역 -->
        <div class="relative">
            <canvas id="gameCanvas" width="600" height="600" class="bg-green-800"></canvas>
            <!-- 오버레이 안내 -->
            <div id="loading-overlay" class="absolute inset-0 bg-black/60 flex items-center justify-center z-50">
                <div class="text-center">
                    <i class="fas fa-spinner fa-spin text-4xl mb-2"></i>
                    <p id="loading-text">서버 연결 중...</p>
                </div>
            </div>
        </div>

        <!-- 중앙: 상점 및 상태 -->
        <div class="w-[150px] bg-gray-800 border-l border-gray-700 flex flex-col">
            <div class="p-3 bg-black/30 border-b border-gray-700">
                <div class="flex items-center text-red-400 font-bold mb-1"><i class="fas fa-heart mr-2"></i><span id="health-ui">100</span></div>
                <div class="flex items-center text-yellow-400 font-bold mb-1"><i class="fas fa-coins mr-2"></i><span id="cash-ui">300</span></div>
            </div>
            <div class="flex-1 p-2 overflow-y-auto space-y-2">
                <button class="tower-btn w-full bg-gray-700 p-2 rounded hover:bg-gray-600 transition border-2 border-transparent" data-type="scout">
                    <div class="text-xs font-bold">정찰병 ($100)</div>
                </button>
                <button class="tower-btn w-full bg-gray-700 p-2 rounded hover:bg-gray-600 transition border-2 border-transparent" data-type="sniper">
                    <div class="text-xs font-bold">스나이퍼 ($250)</div>
                </button>
            </div>
            <div class="p-2 border-t border-gray-700 text-[10px] text-gray-400 text-center">
                접속 ID: <span id="my-id-display">...</span>
            </div>
        </div>

        <!-- 오른쪽: 채팅창 -->
        <div class="w-[200px] bg-gray-950 flex flex-col border-l border-gray-800">
            <div class="p-2 bg-gray-900 text-xs font-bold text-gray-400 border-b border-gray-800">멀티플레이어 채팅</div>
            <div id="chat-box" class="flex-1 p-2 overflow-y-auto text-xs space-y-1 text-left"></div>
            <div class="p-2 border-t border-gray-800">
                <input type="text" id="chat-input" placeholder="메시지 입력..." class="w-full bg-gray-800 text-xs p-2 rounded outline-none focus:ring-1 ring-yellow-500">
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 환경 변수 및 Firebase 초기화 ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'multiplayer-td-demo';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 게임 상수 및 상태 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CELL_SIZE = 50;
        
        let user = null;
        let cash = 300;
        let health = 100;
        let towers = [];
        let selectedTowerType = null;
        let mouseX = 0, mouseY = 0;

        const TOWER_TYPES = {
            scout: { cost: 100, range: 100, damage: 10, color: '#3b82f6', rate: 30 },
            sniper: { cost: 250, range: 250, damage: 50, color: '#a855f7', rate: 100 }
        };

        const pathCells = new Set(["0,2","1,2","2,2","3,2","4,2","5,2","6,2","7,2","8,2","8,3","8,4","8,5","8,6","8,7","8,8","7,8","6,8","5,8","4,8","3,8","2,8","2,9","2,10","2,11"]);

        // --- 초기화 및 인증 (MANDATORY RULE 3 준수) ---
        async function init() {
            try {
                // 커스텀 토큰이 있으면 사용, 없으면 익명 로그인
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Authentication failed:", error);
                document.getElementById('loading-text').innerText = "인증 오류가 발생했습니다.";
                return;
            }

            onAuthStateChanged(auth, (userData) => {
                if (userData) {
                    user = userData;
                    document.getElementById('my-id-display').innerText = user.uid.substring(0, 6);
                    document.getElementById('loading-overlay').classList.add('hidden');
                    
                    // 인증 후 리스너 시작 (RULE 3 준수)
                    listenToTowers();
                    listenToChat();
                    gameLoop();
                }
            });
        }

        // --- 타워 공유 로직 (RULE 1 준수) ---
        function listenToTowers() {
            if (!user) return;
            const towersCol = collection(db, 'artifacts', appId, 'public', 'data', 'towers');
            onSnapshot(towersCol, (snapshot) => {
                towers = snapshot.docs.map(doc => doc.data());
            }, (err) => {
                console.error("Towers listen error:", err);
            });
        }

        async function placeTower(gx, gy) {
            if (!user || !selectedTowerType) return;
            const typeData = TOWER_TYPES[selectedTowerType];
            if (cash < typeData.cost) return;

            const cellKey = `${gx},${gy}`;
            if (pathCells.has(cellKey)) return;
            if (towers.some(t => t.gx === gx && t.gy === gy)) return;

            cash -= typeData.cost;
            document.getElementById('cash-ui').innerText = cash;

            const towerData = {
                gx, gy,
                type: selectedTowerType,
                owner: user.uid,
                placedAt: Date.now()
            };

            try {
                // RULE 1: 정확한 경로 사용
                const towerDoc = doc(db, 'artifacts', appId, 'public', 'data', 'towers', `${gx}_${gy}`);
                await setDoc(towerDoc, towerData);
                selectedTowerType = null;
                document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('border-yellow-500'));
            } catch (e) { console.error("Place tower error:", e); }
        }

        // --- 채팅 로직 (RULE 1, RULE 2 준수) ---
        function listenToChat() {
            if (!user) return;
            const chatCol = collection(db, 'artifacts', appId, 'public', 'data', 'chat');
            onSnapshot(chatCol, (snapshot) => {
                const messages = snapshot.docs.map(doc => doc.data());
                // RULE 2: 클라이언트 사이드 정렬
                messages.sort((a, b) => (a.time || 0) - (b.time || 0));
                
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = "";
                messages.slice(-30).forEach(msg => {
                    const div = document.createElement('div');
                    div.className = "break-words";
                    div.innerHTML = `<span class="text-blue-400 font-bold">${(msg.sender || "").substring(0,4)}:</span> ${msg.text}`;
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }, (err) => console.error("Chat listen error:", err));
        }

        async function sendChat() {
            if (!user) return;
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = "";
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chat'), {
                    sender: user.uid,
                    text: text,
                    time: Date.now()
                });
            } catch (e) { console.error("Send chat error:", e); }
        }

        // --- 게임 엔진 ---
        function drawMap() {
            ctx.fillStyle = "#166534"; 
            ctx.fillRect(0,0,600,600);
            
            ctx.fillStyle = "#92400e"; 
            pathCells.forEach(cell => {
                const [x, y] = cell.split(',').map(Number);
                ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            });
        }

        function gameLoop() {
            if (!user) return;
            ctx.clearRect(0,0,600,600);
            drawMap();

            towers.forEach(t => {
                const data = TOWER_TYPES[t.type];
                if (!data) return;
                ctx.fillStyle = data.color;
                ctx.beginPath();
                ctx.arc(t.gx*CELL_SIZE + 25, t.gy*CELL_SIZE + 25, 18, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = "white";
                ctx.font = "8px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText((t.owner || "").substring(0,4), t.gx*CELL_SIZE + 25, t.gy*CELL_SIZE + 42);
            });

            if (selectedTowerType) {
                const gx = Math.floor(mouseX / CELL_SIZE);
                const gy = Math.floor(mouseY / CELL_SIZE);
                const data = TOWER_TYPES[selectedTowerType];
                
                ctx.fillStyle = "rgba(255,255,255,0.2)";
                ctx.beginPath();
                ctx.arc(gx*CELL_SIZE+25, gy*CELL_SIZE+25, data.range, 0, Math.PI*2);
                ctx.fill();

                ctx.fillStyle = (pathCells.has(`${gx},${gy}`) || towers.some(t => t.gx === gx && t.gy === gy)) ? "rgba(255,0,0,0.5)" : "rgba(255,255,255,0.5)";
                ctx.fillRect(gx*CELL_SIZE, gy*CELL_SIZE, CELL_SIZE, CELL_SIZE);
            }

            requestAnimationFrame(gameLoop);
        }

        // --- 이벤트 리스너 ---
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('click', () => {
            const gx = Math.floor(mouseX / CELL_SIZE);
            const gy = Math.floor(mouseY / CELL_SIZE);
            placeTower(gx, gy);
        });

        document.querySelectorAll('.tower-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                selectedTowerType = e.currentTarget.dataset.type;
                document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('border-yellow-500'));
                e.currentTarget.classList.add('border-yellow-500');
            });
        });

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChat();
        });

        init();
    </script>
</body>
</html>
