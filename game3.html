<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멀티플레이어 술래잡기: 광활한 맵 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #1a202c; color: white; user-select: none; overflow: hidden; }
        #game-container { width: 1100px; height: 700px; box-shadow: 0 0 25px rgba(0,0,0,0.6); }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 2px; }
        canvas { background-image: radial-gradient(#2d3748 1px, transparent 1px); background-size: 40px 40px; }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center flex-col">

    <div class="mb-2 text-center">
        <h1 class="text-3xl font-black text-red-500 tracking-tighter italic uppercase drop-shadow-lg">Tag: Wide Arena</h1>
        <p class="text-gray-400 text-sm">WASD로 이동 | 술래는 왼쪽 아래, 플레이어는 오른쪽 위에서 시작합니다!</p>
    </div>

    <div class="relative bg-gray-900 rounded-2xl overflow-hidden flex border-4 border-gray-800" id="game-container">
        <!-- 왼쪽: 확장된 캔버스 영역 -->
        <div class="relative">
            <canvas id="gameCanvas" width="800" height="700" class="bg-gray-800"></canvas>
            <div id="loading-overlay" class="absolute inset-0 bg-black/80 flex items-center justify-center z-50">
                <div class="text-center">
                    <i class="fas fa-ghost fa-spin text-5xl text-red-500 mb-4"></i>
                    <p id="loading-text" class="text-xl font-bold">전장 진입 중...</p>
                </div>
            </div>
        </div>

        <!-- 오른쪽: 정보 및 채팅창 -->
        <div class="w-[300px] bg-gray-950 flex flex-col border-l border-gray-800">
            <div class="p-5 bg-gray-900 border-b border-gray-800 shadow-inner">
                <div class="text-xs text-gray-500 uppercase tracking-widest mb-1">상태</div>
                <div class="flex items-center justify-between">
                    <span id="my-role-display" class="font-black text-xl text-blue-400">플레이어</span>
                    <span id="my-id-display" class="text-xs text-gray-600 font-mono">ID: ...</span>
                </div>
            </div>

            <div class="p-3 bg-gray-900/50 text-xs font-bold text-gray-500 border-b border-gray-800 flex justify-between items-center">
                <span class="flex items-center"><i class="fas fa-comments mr-2"></i>채팅</span>
                <span id="player-count" class="bg-green-900/50 text-green-400 px-2 py-0.5 rounded-full text-[10px]">0명 접속</span>
            </div>
            <div id="chat-box" class="flex-1 p-3 overflow-y-auto text-sm space-y-2 text-left bg-black/20"></div>
            <div class="p-3 border-t border-gray-800 bg-gray-900">
                <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." class="w-full bg-gray-800 text-sm p-3 rounded-lg outline-none focus:ring-2 ring-red-600 transition-all">
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 초기화 ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'multiplayer-tag-v2';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let user = null;
        let players = {};
        let gameState = { taggerId: null };
        
        const PLAYER_RADIUS = 20;
        const NORMAL_SPEED = 4.2;
        const TAGGER_SPEED = 4.8;
        
        // 내 로컬 위치 초기화 (오른쪽 위 기본)
        let myPos = { x: 750, y: 50 };
        const keys = { w: false, a: false, s: false, d: false };

        // 지형지물 배치 (스폰 지역인 왼쪽 아래와 오른쪽 위를 피해서 배치)
        const obstacles = [
            { x: 200, y: 100, w: 400, h: 20 },
            { x: 100, y: 200, w: 20, h: 300 },
            { x: 680, y: 200, w: 20, h: 300 },
            { x: 200, y: 580, w: 400, h: 20 },
            { x: 300, y: 300, w: 200, h: 100 }, // 중앙 거대 장애물
            { x: 200, y: 450, w: 100, h: 20 },
            { x: 500, y: 230, w: 100, h: 20 }
        ];

        async function init() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
                document.getElementById('loading-text').innerText = "접속 불가";
                return;
            }

            onAuthStateChanged(auth, async (userData) => {
                if (userData) {
                    user = userData;
                    document.getElementById('my-id-display').innerText = user.uid.substring(0, 6);
                    document.getElementById('loading-overlay').classList.add('hidden');
                    
                    // 게임 데이터 감시 시작
                    listenToGameState();
                    listenToPlayers();
                    listenToChat();
                    
                    // 위치 동기화 루프
                    syncPresence();
                    
                    requestAnimationFrame(gameLoop);
                }
            });
        }

        // --- 이동 및 충돌 처리 ---
        function moveMyPlayer() {
            if (!user) return;
            const isTagger = gameState.taggerId === user.uid;
            const currentSpeed = isTagger ? TAGGER_SPEED : NORMAL_SPEED;
            
            let nextX = myPos.x;
            let nextY = myPos.y;

            if (keys.w) nextY -= currentSpeed;
            if (keys.s) nextY += currentSpeed;
            if (keys.a) nextX -= currentSpeed;
            if (keys.d) nextX += currentSpeed;

            // 맵 경계
            nextX = Math.max(PLAYER_RADIUS, Math.min(canvas.width - PLAYER_RADIUS, nextX));
            nextY = Math.max(PLAYER_RADIUS, Math.min(canvas.height - PLAYER_RADIUS, nextY));

            // 지형지물 충돌 (미끄러짐 구현)
            if (!isColliding(nextX, nextY)) {
                myPos.x = nextX;
                myPos.y = nextY;
            } else {
                if (!isColliding(nextX, myPos.y)) myPos.x = nextX;
                else if (!isColliding(myPos.x, nextY)) myPos.y = nextY;
            }
        }

        function isColliding(px, py) {
            for (const obs of obstacles) {
                const closestX = Math.max(obs.x, Math.min(px, obs.x + obs.w));
                const closestY = Math.max(obs.y, Math.min(py, obs.y + obs.h));
                const dx = px - closestX;
                const dy = py - closestY;
                if ((dx * dx + dy * dy) < (PLAYER_RADIUS * PLAYER_RADIUS)) return true;
            }
            return false;
        }

        // --- 네트워크 동기화 ---
        async function syncPresence() {
            if (!user) return;
            // 최초 접속 시 역할에 따른 위치 설정 (이미 게임 중인 경우 반영 위해 리스너 내부에서 처리해도 되지만 초기값 설정)
            setInterval(async () => {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid);
                await setDoc(ref, {
                    uid: user.uid,
                    x: myPos.x,
                    y: myPos.y,
                    lastSeen: Date.now()
                }, { merge: true });
            }, 60);
        }

        function listenToPlayers() {
            const col = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            onSnapshot(col, (snapshot) => {
                const now = Date.now();
                const updatedPlayers = {};
                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    if (now - data.lastSeen < 10000) {
                        updatedPlayers[data.uid] = data;
                    }
                });
                players = updatedPlayers;
                document.getElementById('player-count').innerText = `${Object.keys(players).length}명 접속`;
                
                // 술래가 없고 내가 방장이거나 첫 번째 플레이어라면 술래 배정
                if (Object.keys(players).length > 0 && !gameState.taggerId) {
                    assignTagger(Object.keys(players)[0]);
                }
            });
        }

        function listenToGameState() {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'status', 'current');
            onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    const oldTagger = gameState.taggerId;
                    gameState = snapshot.data();
                    
                    // 술래가 바뀌었을 때 초기 위치 강제 이동 (처음 지정되었을 때만)
                    if (oldTagger !== gameState.taggerId && gameState.taggerId === user.uid) {
                        // 술래가 되면 왼쪽 아래로
                        myPos = { x: 50, y: 650 };
                    } else if (oldTagger !== gameState.taggerId && oldTagger === user.uid) {
                        // 술래에서 풀려나면 오른쪽 위로
                        myPos = { x: 750, y: 50 };
                    }

                    const isTagger = gameState.taggerId === user.uid;
                    const display = document.getElementById('my-role-display');
                    display.innerText = isTagger ? "당신은 술래!" : "도망치세요!";
                    display.className = isTagger ? "font-black text-xl text-red-500 animate-pulse" : "font-black text-xl text-blue-400";
                }
            });
        }

        async function assignTagger(uid) {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'status', 'current'), { 
                taggerId: uid, 
                lastTagTime: Date.now() 
            });
        }

        async function checkTagCollision() {
            if (!user || gameState.taggerId !== user.uid) return;
            for (let id in players) {
                if (id === user.uid) continue;
                const p = players[id];
                const dist = Math.sqrt((myPos.x - p.x)**2 + (myPos.y - p.y)**2);
                if (dist < 38) {
                    await assignTagger(id);
                    await sendSystemMessage(`${id.substring(0,4)} 플레이어가 술래가 되었습니다!`);
                    break;
                }
            }
        }

        // --- 채팅 ---
        function listenToChat() {
            const chatCol = collection(db, 'artifacts', appId, 'public', 'data', 'chat');
            onSnapshot(chatCol, (snapshot) => {
                const messages = snapshot.docs.map(doc => doc.data());
                messages.sort((a, b) => (a.time || 0) - (b.time || 0));
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = "";
                messages.slice(-25).forEach(msg => {
                    const div = document.createElement('div');
                    const isSystem = msg.sender === 'SYSTEM';
                    div.className = isSystem ? "bg-yellow-900/20 p-2 rounded text-yellow-500 text-xs italic text-center" : "bg-gray-800/50 p-2 rounded-lg";
                    div.innerHTML = isSystem 
                        ? `[알림] ${msg.text}`
                        : `<span class="text-blue-400 font-bold mr-1">${(msg.sender || "").substring(0,4)}:</span> <span class="text-gray-200">${msg.text}</span>`;
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !user) return;
            input.value = "";
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chat'), {
                sender: user.uid, text: text, time: Date.now()
            });
        }

        async function sendSystemMessage(text) {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chat'), {
                sender: 'SYSTEM', text: text, time: Date.now()
            });
        }

        // --- 렌더링 ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 지형지물
            ctx.fillStyle = "#334155";
            ctx.strokeStyle = "#475569";
            ctx.lineWidth = 3;
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
            });

            // 플레이어들
            for (let id in players) {
                const p = (id === user.uid) ? myPos : players[id];
                const isTagger = gameState.taggerId === id;
                const isMe = id === user.uid;

                // 그림자 효과
                ctx.beginPath();
                ctx.ellipse(p.x, p.y + 10, 15, 8, 0, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(0,0,0,0.3)";
                ctx.fill();

                // 캐릭터 본체
                ctx.beginPath();
                ctx.arc(p.x, p.y, PLAYER_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = isTagger ? "#ef4444" : (isMe ? "#3b82f6" : "#4ade80");
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 3;
                ctx.stroke();

                // 술래 후광
                if (isTagger) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, PLAYER_RADIUS + 5, 0, Math.PI * 2);
                    ctx.strokeStyle = "rgba(239, 68, 68, 0.5)";
                    ctx.setLineDash([5, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                ctx.fillStyle = "white";
                ctx.font = "bold 11px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(isMe ? "나" : id.substring(0, 4), p.x, p.y + 38);
            }
        }

        function gameLoop() {
            moveMyPlayer();
            checkTagCollision();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // --- 컨트롤러 ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) {
                keys[key] = true;
                if (['w', 'a', 's', 'd'].includes(key)) e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChat();
        });

        init();
    </script>
</body>
</html>
